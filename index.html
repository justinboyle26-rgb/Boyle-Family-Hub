<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boyle Family Hub — To-Do</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<style>
[data-theme="dark"] {
  --bg: #0a1628;
  --surface: #0f2040;
  --surface2: #162d55;
  --surface3: #1e3a6e;
  --border: rgba(100,160,255,0.12);
  --text: #e8f4ff;
  --text2: #7db3e8;
  --text3: #4a7ab5;
  --shadow: 0 8px 32px rgba(0,0,0,0.5);
  --setup-bg: radial-gradient(ellipse at 60% 40%, #0d2d5e 0%, #0a1628 70%);
  --modal-shadow: 0 24px 80px rgba(0,0,0,.7);
  --scrollbar-thumb: #1e3a6e;
}
[data-theme="light"] {
  --bg: #daeeff;
  --surface: #ffffff;
  --surface2: #eaf5ff;
  --surface3: #d0eaff;
  --border: rgba(0,100,200,0.12);
  --text: #0a2a4a;
  --text2: #2a6096;
  --text3: #5a90c0;
  --shadow: 0 8px 32px rgba(0,80,160,0.12);
  --setup-bg: radial-gradient(ellipse at 60% 40%, #b8deff 0%, #daeeff 70%);
  --modal-shadow: 0 24px 80px rgba(0,80,160,.18);
  --scrollbar-thumb: #a0c8f0;
}
:root {
  --accent: #1a7fe8;
  --accent2: #e84a6f;
  --accent3: #18c97a;
  --accent4: #f0960a;
  --accent5: #5ab4ff;
  --radius: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background .25s, color .25s;
}
#setup-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  background: var(--setup-bg);
}
.setup-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 48px;
  width: 540px;
  max-width: 95vw;
  box-shadow: var(--shadow);
}
.setup-card h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 2.2rem;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #5ab4ff, #1a7fe8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.setup-card p { color: var(--text2); margin-bottom: 28px; font-size: .95rem; line-height: 1.6; }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: .82rem; font-weight: 600; color: var(--text2); margin-bottom: 6px; letter-spacing: .05em; text-transform: uppercase; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 11px 14px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-family: inherit; font-size: .95rem;
  outline: none; transition: border-color .2s, background .25s;
}
.form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
.form-group select { cursor: pointer; }
.add-member-row { display: flex; gap: 8px; margin-top: 8px; }
.add-member-row input { flex: 1; }
.btn {
  padding: 11px 22px; border-radius: 10px; border: none;
  font-family: inherit; font-weight: 600; font-size: .9rem;
  cursor: pointer; transition: all .15s;
}
.btn-primary { background: linear-gradient(135deg, #1a7fe8, #1260c0); color: #fff; box-shadow: 0 3px 12px rgba(26,127,232,.35); }
.btn-primary:hover { background: linear-gradient(135deg, #2a8ff8, #1a70d0); transform: translateY(-1px); box-shadow: 0 5px 18px rgba(26,127,232,.45); }
.btn-sm { padding: 8px 14px; font-size: .82rem; border-radius: 8px; }
.btn-ghost { background: var(--surface3); color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); background: var(--surface2); border-color: var(--accent5); }
.divider { height: 1px; background: var(--border); margin: 24px 0; }
.step-label { font-size: .75rem; font-weight: 700; color: var(--accent5); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 16px; }
#app { display: none; min-height: 100vh; }
.sidebar {
  position: fixed; left: 0; top: 0; bottom: 0; width: 268px;
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; z-index: 100;
  transition: transform .25s ease, background .25s;
}
.sidebar-header {
  padding: 18px 18px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.sidebar-header .app-name {
  font-family: 'DM Serif Display', serif;
  font-size: 1.25rem;
  background: linear-gradient(135deg, #5ab4ff, #1a7fe8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  flex: 1;
}
.sidebar-header .app-sub { font-size: .72rem; color: var(--text3); margin-top: 1px; }
.theme-toggle-btn {
  width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface2); cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: .9rem; transition: all .15s; flex-shrink: 0;
}
.theme-toggle-btn:hover { background: var(--surface3); border-color: var(--accent); }
.family-list { padding: 10px 8px; flex: 1; overflow-y: auto; }
.family-list-label { font-size: .68rem; font-weight: 700; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; padding: 6px 8px 8px; }
.member-btn {
  width: 100%; display: flex; align-items: center; gap: 9px;
  padding: 8px 9px; border-radius: 10px; border: none;
  background: transparent; color: var(--text2); font-family: inherit; font-size: .88rem;
  cursor: pointer; transition: all .15s; text-align: left;
}
.member-btn:hover { background: var(--surface2); color: var(--text); }
.member-btn.active { background: rgba(26,127,232,.15); color: var(--text); border-left: 3px solid var(--accent); padding-left: 6px; }
.member-btn .m-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .75rem; font-weight: 700; flex-shrink: 0; overflow: hidden;
}
.member-btn .m-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.member-btn .m-count {
  margin-left: auto; background: var(--surface3); color: var(--text3);
  font-size: .7rem; font-weight: 600; padding: 2px 7px; border-radius: 20px;
}
.member-btn.active .m-count { background: var(--accent); color: #fff; }
.lists-section { padding: 6px 8px; border-top: 1px solid var(--border); }
.lists-section-header { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px 8px; }
.lists-section-label { font-size: .68rem; font-weight: 700; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; }
.add-list-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 1.1rem; line-height: 1; padding: 0 2px; transition: color .15s; }
.add-list-btn:hover { color: var(--accent); }
.list-btn {
  width: 100%; display: flex; align-items: center; gap: 9px;
  padding: 7px 9px; border-radius: 10px; border: none;
  background: transparent; color: var(--text2); font-family: inherit; font-size: .86rem;
  cursor: pointer; transition: all .15s; text-align: left;
}
.list-btn:hover { background: var(--surface2); color: var(--text); }
.list-btn.active { background: rgba(26,127,232,.1); color: var(--text); }
.list-btn .list-icon { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: .8rem; flex-shrink: 0; }
.list-btn .list-count { margin-left: auto; font-size: .7rem; color: var(--text3); }
.list-btn .list-del { opacity: 0; background: none; border: none; cursor: pointer; color: var(--text3); font-size: .85rem; padding: 0 2px; transition: color .1s; }
.list-btn:hover .list-del { opacity: 1; }
.list-btn .list-del:hover { color: var(--accent2); }
.sidebar-section { padding: 8px; border-top: 1px solid var(--border); }
.nav-btn {
  width: 100%; display: flex; align-items: center; gap: 9px;
  padding: 8px 9px; border-radius: 10px; border: none;
  background: transparent; color: var(--text2); font-family: inherit; font-size: .86rem;
  cursor: pointer; transition: all .15s; text-align: left;
}
.nav-btn:hover { background: var(--surface2); color: var(--text); }
.nav-btn.active { background: rgba(26,127,232,.12); color: var(--text); border-left: 3px solid var(--accent); padding-left: 6px; }
.nav-btn svg { flex-shrink: 0; }
.sync-status { padding: 9px 18px; font-size: .7rem; color: var(--text3); border-top: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent3); flex-shrink: 0; animation: pulse 2s infinite; }
.sync-dot.syncing { background: var(--accent4); }
.sync-dot.error { background: var(--accent2); animation: none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.main { margin-left: 268px; min-height: 100vh; display: flex; flex-direction: column; }
.topbar {
  padding: 18px 30px; display: flex; align-items: center; gap: 14px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky; top: 0; z-index: 50;
  transition: background .25s;
  box-shadow: 0 2px 12px rgba(0,60,140,.10);
}
.topbar h2 { font-family: 'DM Serif Display', serif; font-size: 1.55rem; flex: 1; }
.topbar .member-color-bar { width: 5px; height: 26px; border-radius: 3px; flex-shrink: 0; }
.topbar-actions { display: flex; gap: 7px; align-items: center; }
.icon-btn {
  width: 34px; height: 34px; border-radius: 9px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text2); display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .15s;
}
.icon-btn:hover { background: var(--surface3); color: var(--text); border-color: var(--accent); }
.view-tabs { display: flex; gap: 4px; padding: 14px 30px 0; border-bottom: 1px solid var(--border); background: var(--surface); }
.view-tab {
  padding: 8px 16px; border-radius: 0; border: none;
  background: transparent; color: var(--text3); font-family: inherit; font-size: .84rem; font-weight: 600;
  cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; margin-bottom: -1px;
}
.view-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.view-tab:hover:not(.active) { color: var(--text2); }
.content { flex: 1; padding: 22px 30px; }
.section-title { font-size: .7rem; font-weight: 700; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.add-task-bar {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 11px 15px; margin-bottom: 14px;
  transition: border-color .2s; box-shadow: 0 2px 8px rgba(0,60,140,.06);
}
.add-task-bar:focus-within { border-color: var(--accent); box-shadow: 0 2px 12px rgba(26,127,232,.15); }
.add-task-bar input {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-family: inherit; font-size: .93rem;
}
.add-task-bar input::placeholder { color: var(--text3); }
.task-item {
  display: flex; align-items: flex-start; gap: 11px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 15px; margin-bottom: 7px;
  transition: all .15s; position: relative;
  box-shadow: 0 1px 4px rgba(0,60,140,.06);
}
.task-item:hover { border-color: rgba(26,127,232,.35); background: var(--surface2); box-shadow: 0 3px 12px rgba(26,127,232,.1); }
.task-item.completed { opacity: .5; }
.task-item.completed .task-title { text-decoration: line-through; color: var(--text3); }
.task-check {
  width: 19px; height: 19px; border-radius: 50%; border: 2px solid var(--border);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  transition: all .15s; margin-top: 2px; cursor: pointer; background: transparent;
}
.task-check:hover { border-color: var(--accent); background: rgba(26,127,232,.1); }
.task-check.done { background: var(--accent); border-color: var(--accent); }
.task-check.done::after { content: '✓'; color: #fff; font-size: .65rem; font-weight: 700; }
.task-body { flex: 1; min-width: 0; }
.task-title { font-size: .91rem; font-weight: 500; margin-bottom: 4px; }
.task-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.task-tag { font-size: .7rem; padding: 2px 8px; border-radius: 12px; font-weight: 600; }
.task-due { font-size: .73rem; color: var(--text3); display: flex; align-items: center; gap: 3px; }
.task-due.overdue { color: var(--accent2); }
.task-due.today { color: var(--accent3); }
.prio-high { color: var(--accent2); font-size: .72rem; font-weight: 600; }
.prio-med  { color: var(--accent4); font-size: .72rem; font-weight: 600; }
.prio-low  { color: var(--accent3); font-size: .72rem; font-weight: 600; }
.task-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
.task-item:hover .task-actions { opacity: 1; }
.task-action-btn {
  width: 27px; height: 27px; border-radius: 7px; border: none;
  background: var(--surface3); color: var(--text3); cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all .15s;
}
.task-action-btn:hover { background: var(--accent); color: #fff; }
.task-action-btn.del:hover { background: var(--accent2); }
.assigned-tag { display: flex; align-items: center; gap: 4px; font-size: .7rem; color: var(--text3); }
.mini-av { width: 15px; height: 15px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: .5rem; font-weight: 700; overflow: hidden; }
.mini-av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.tasks-empty { text-align: center; padding: 60px 20px; color: var(--text3); }
.tasks-empty .emoji { font-size: 2.5rem; display: block; margin-bottom: 12px; }
.filters { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px; }
.filter-chip {
  padding: 4px 13px; border-radius: 20px; border: 1px solid var(--border);
  background: transparent; color: var(--text3); font-family: inherit; font-size: .78rem; font-weight: 600;
  cursor: pointer; transition: all .15s;
}
.filter-chip:hover { border-color: var(--accent); color: var(--text); background: rgba(26,127,232,.08); }
.filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(26,127,232,.3); }
.progress-bar { height: 5px; background: var(--surface3); border-radius: 3px; overflow: hidden; margin: 6px 0 14px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent5)); border-radius: 3px; transition: width .4s ease; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: 0 2px 12px rgba(0,60,140,.08); }
.cal-header-cell { background: var(--surface2); text-align: center; padding: 9px 4px; font-size: .7rem; font-weight: 700; color: var(--accent5); text-transform: uppercase; letter-spacing: .05em; }
.cal-cell { background: var(--surface); min-height: 88px; padding: 7px; cursor: pointer; transition: background .1s; }
.cal-cell:hover { background: var(--surface2); }
.cal-cell.other-month { opacity: .35; }
.cal-cell.today .cal-day-num { background: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(26,127,232,.4); }
.cal-day-num { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .76rem; font-weight: 600; margin-bottom: 4px; }
.cal-task-dot { font-size: .7rem; background: rgba(26,127,232,.12); border-radius: 4px; padding: 2px 5px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 3px; color: var(--text2); }
.cal-task-dot .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.cal-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.cal-nav h3 { font-family: 'DM Serif Display', serif; font-size: 1.25rem; flex: 1; }
.family-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(255px, 1fr)); gap: 14px; }
.family-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: all .2s; cursor: pointer; box-shadow: 0 2px 8px rgba(0,60,140,.07); }
.family-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(26,127,232,.15); border-color: rgba(26,127,232,.35); }
.family-card-header { padding: 15px; display: flex; align-items: center; gap: 11px; }
.family-card-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 700; flex-shrink: 0; overflow: hidden; }
.family-card-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.family-card-name { font-weight: 600; font-size: .97rem; }
.family-card-role { font-size: .73rem; color: var(--text3); margin-top: 2px; }
.family-card-stats { border-top: 1px solid var(--border); padding: 11px 15px; display: flex; gap: 16px; background: var(--surface2); }
.stat { text-align: center; flex: 1; }
.stat-num { font-size: 1.15rem; font-weight: 700; font-family: 'DM Serif Display', serif; color: var(--accent5); }
.stat-lbl { font-size: .66rem; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; }
.card-progress-wrap { padding: 10px 15px 12px; border-top: 1px solid var(--border); }
.card-progress-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.card-progress-pct { font-size: .75rem; font-weight: 700; }
.card-progress-done { font-size: .7rem; color: var(--text3); }
.card-progress-track { height: 7px; background: var(--surface3); border-radius: 99px; overflow: hidden; }
.card-progress-fill { height: 100%; border-radius: 99px; transition: width .6s cubic-bezier(.4,0,.2,1); }
.card-complete-badge { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 7px; font-size: .78rem; font-weight: 600; border-top: 1px solid var(--border); animation: badge-pop .4s cubic-bezier(.34,1.56,.64,1); background: rgba(24,201,122,.07); }
@keyframes badge-pop { from{transform:scale(.7);opacity:0} to{transform:scale(1);opacity:1} }
#celebration-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 99999; display: flex; align-items: center; justify-content: center; }
.celeb-message { background: var(--surface); border: 2px solid var(--accent); border-radius: 20px; padding: 20px 36px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.4); animation: celeb-in .4s cubic-bezier(.34,1.56,.64,1) forwards; pointer-events: none; }
@keyframes celeb-in { from{transform:scale(.5) translateY(40px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }
.celeb-emoji { font-size: 2.8rem; display: block; margin-bottom: 6px; }
.celeb-title { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--text); }
.celeb-sub { font-size: .82rem; color: var(--text3); margin-top: 4px; }
#confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 99998; }
.list-view-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
.list-view-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
.list-view-name { font-family: 'DM Serif Display', serif; font-size: 1.5rem; }
.list-view-count { font-size: .8rem; color: var(--text3); margin-top: 2px; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,20,60,.70); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity .2s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 30px; width: 500px; max-width: 95vw; max-height: 90vh; overflow-y: auto; transform: scale(.95) translateY(10px); transition: transform .2s, background .25s; box-shadow: var(--modal-shadow); }
.modal-overlay.open .modal { transform: scale(1) translateY(0); }
.modal h3 { font-family: 'DM Serif Display', serif; font-size: 1.35rem; margin-bottom: 18px; color: var(--text); }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }
.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.avatar-picker { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
.avatar-preview { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 3px solid var(--border); background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; overflow: hidden; flex-shrink: 0; cursor: pointer; position: relative; }
.avatar-preview:hover::after { content: '📷'; position: absolute; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; border-radius: 50%; }
.avatar-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.avatar-upload-input { display: none; }
.avatar-emoji-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.avatar-emoji-btn { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.avatar-emoji-btn:hover { border-color: var(--accent); background: rgba(26,127,232,.12); }
.avatar-emoji-btn.selected { border-color: var(--accent); background: rgba(26,127,232,.18); }
.gcal-banner { background: linear-gradient(135deg, rgba(26,127,232,.10), rgba(90,180,255,.10)); border: 1px solid rgba(26,127,232,.25); border-radius: var(--radius); padding: 13px 17px; margin-bottom: 18px; display: flex; align-items: center; gap: 11px; }
.gcal-banner p { font-size: .83rem; color: var(--text2); line-height: 1.5; }
.gcal-banner a { color: var(--accent5); text-decoration: none; font-weight: 600; }
.settings-section { margin-bottom: 28px; }
.settings-section h4 { font-weight: 700; margin-bottom: 10px; font-size: .93rem; color: var(--accent5); letter-spacing: .03em; }
.settings-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid var(--border); }
.settings-row:last-child { border-bottom: none; }
.settings-row-label { font-size: .88rem; }
.settings-row-sub { font-size: .76rem; color: var(--text3); margin-top: 2px; }
.toggle { width: 40px; height: 22px; background: var(--surface3); border-radius: 11px; position: relative; cursor: pointer; transition: background .2s; border: none; flex-shrink: 0; }
.toggle.on { background: var(--accent); }
.toggle::after { content: ''; position: absolute; width: 16px; height: 16px; background: #fff; border-radius: 50%; top: 3px; left: 3px; transition: transform .2s; }
.toggle.on::after { transform: translateX(18px); }
.toast-container { position: fixed; bottom: 22px; right: 22px; z-index: 9999; display: flex; flex-direction: column; gap: 7px; }
.toast { background: var(--surface); border: 1px solid var(--border); border-radius: 11px; padding: 11px 17px; font-size: .86rem; box-shadow: var(--shadow); display: flex; align-items: center; gap: 9px; min-width: 230px; animation: slide-in .25s ease; opacity: 1; transition: opacity .2s; }
.toast.out { opacity: 0; }
@keyframes slide-in { from{transform:translateX(40px);opacity:0} }
.toast.success .toast-icon { color: var(--accent3); }
.toast.error   .toast-icon { color: var(--accent2); }
.toast.info    .toast-icon { color: var(--accent5); }
/* CSV IMPORT STYLES */
.import-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 28px; text-align: center; cursor: pointer; transition: all .2s; background: var(--surface2); }
.import-zone:hover, .import-zone.dragover { border-color: var(--accent); background: rgba(26,127,232,.07); }
.import-zone .import-icon { font-size: 2rem; display: block; margin-bottom: 8px; }
.import-zone p { font-size: .85rem; color: var(--text2); margin-bottom: 4px; }
.import-zone small { font-size: .75rem; color: var(--text3); }
.import-preview { margin-top: 14px; max-height: 220px; overflow-y: auto; border: 1px solid var(--border); border-radius: 10px; }
.import-preview table { width: 100%; border-collapse: collapse; font-size: .78rem; }
.import-preview th { background: var(--surface3); padding: 7px 10px; text-align: left; font-weight: 700; color: var(--accent5); border-bottom: 1px solid var(--border); position: sticky; top: 0; }
.import-preview td { padding: 6px 10px; border-bottom: 1px solid var(--border); color: var(--text2); }
.import-preview tr:last-child td { border-bottom: none; }
.import-preview tr:hover td { background: var(--surface2); }
.import-col-map { margin-top: 14px; }
.import-col-map .map-row { display: grid; grid-template-columns: 1fr 20px 1fr; gap: 8px; align-items: center; margin-bottom: 8px; font-size: .82rem; }
.import-col-map .map-arrow { text-align: center; color: var(--accent5); }
.import-col-map select { padding: 7px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: .82rem; outline: none; }
.import-col-map select:focus { border-color: var(--accent); }
.import-stats { display: flex; gap: 10px; margin-top: 12px; }
.import-stat { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; text-align: center; }
.import-stat-num { font-size: 1.3rem; font-weight: 700; font-family: 'DM Serif Display', serif; color: var(--accent5); }
.import-stat-lbl { font-size: .68rem; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; }
/* SHEETS BANNER */
.sheets-banner { background: linear-gradient(135deg, rgba(15,157,88,.10), rgba(26,127,232,.10)); border: 1px solid rgba(15,157,88,.25); border-radius: 10px; padding: 12px 15px; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; font-size: .82rem; color: var(--text2); }
.sheets-banner a { color: #0f9d58; font-weight: 600; text-decoration: none; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
.sidebar-toggle { display: none; position: fixed; top: 14px; left: 14px; z-index: 200; width: 38px; height: 38px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); cursor: pointer; align-items: center; justify-content: center; color: var(--text2); }
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .sidebar-toggle { display: flex; }
  .topbar { padding: 13px 16px 13px 60px; }
  .content { padding: 14px 16px; }
  .view-tabs { padding: 10px 16px 0; }
  .family-grid { grid-template-columns: 1fr; }
  .row-2 { grid-template-columns: 1fr; }
  .import-col-map .map-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="setup-screen" style="display:none">
  <div class="setup-card">
    <h1>Boyle Family Hub</h1>
    <p>The Boyle family's command center.</p>
    <div class="step-label">Family Members (up to 9)</div>
    <div id="member-list-setup" style="display:flex;flex-wrap:wrap;gap:8px;min-height:20px;margin:10px 0"></div>
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <input id="new-member-name" type="text" maxlength="24" placeholder="Name (e.g. Mom, Dad, Emma…)" style="flex:1;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.95rem;font-family:inherit;outline:none">
      <button type="button" onclick="setupDoAdd()" style="padding:11px 18px;background:var(--surface3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.88rem;font-family:inherit;font-weight:600;cursor:pointer;white-space:nowrap">+ Add</button>
    </div>
    <div class="divider"></div>
    <div class="step-label">Google Calendar (Optional)</div>
    <div class="form-group"><input type="text" id="setup-gcal-key" placeholder="Google Calendar API Key"></div>
    <div class="form-group"><input type="text" id="setup-gcal-id" placeholder="Calendar ID"></div>
    <div class="divider"></div>
    <button type="button" onclick="setupDoLaunch()" style="display:block;width:100%;padding:14px;background:linear-gradient(135deg,#1a7fe8,#1260c0);color:#fff;border:none;border-radius:10px;font-size:1rem;font-family:inherit;font-weight:700;cursor:pointer;text-align:center;box-shadow:0 4px 16px rgba(26,127,232,.4)">Launch Boyle Family Hub →</button>
    <div id="setup-msg" style="margin-top:10px;min-height:20px;text-align:center;font-size:.82rem"></div>
  </div>
</div>

<div id="app" style="display:block">
  <button class="sidebar-toggle" onclick="toggleSidebar()">
    <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div>
        <div class="app-name">Boyle Family Hub</div>
        <div class="app-sub">To-Do &amp; Calendar</div>
      </div>
      <button class="theme-toggle-btn" onclick="toggleTheme()" id="theme-btn" title="Toggle dark/light mode">🌙</button>
    </div>
    <div class="family-list">
      <div class="family-list-label">Members</div>
      <button class="member-btn active" data-member="family" onclick="selectMember('family',this)">
        <span class="m-avatar" style="background:rgba(26,127,232,.18);color:#5ab4ff;font-size:1rem">🏠</span>
        <span>All Family</span>
        <span class="m-count" id="count-family">0</span>
      </button>
      <div id="sidebar-members"></div>
    </div>
    <div class="lists-section">
      <div class="lists-section-header">
        <span class="lists-section-label">My Lists</span>
        <button class="add-list-btn" onclick="openAddList()" title="Create new list">+</button>
      </div>
      <div id="sidebar-lists"></div>
    </div>
    <div class="sidebar-section">
      <button class="nav-btn" id="nav-overview" onclick="setView('overview')">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Family Overview
      </button>
      <button class="nav-btn" id="nav-calendar" onclick="setView('calendar')">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Family Calendar
      </button>
      <button class="nav-btn" id="nav-import" onclick="setView('import')">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Import Tasks
      </button>
      <button class="nav-btn" id="nav-settings" onclick="setView('settings')">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Settings
      </button>
    </div>
    <div class="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-text">Connecting...</span>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="member-color-bar" id="topbar-color" style="background:var(--accent)"></div>
      <h2 id="topbar-title">All Family</h2>
      <div class="topbar-actions">
        <button class="btn btn-ghost btn-sm" onclick="openMassUpdate()" title="Mass update tasks">⚡ Mass Update</button>
        <button class="btn btn-ghost btn-sm" onclick="setView('import')">⬆ Import</button>
        <button class="btn btn-primary btn-sm" onclick="openAddTask()">+ Add Task</button>
      </div>
    </div>
    <div class="view-tabs" id="view-tabs" style="display:none">
      <button class="view-tab active" onclick="setMemberView('myday',this)">My Day</button>
      <button class="view-tab" onclick="setMemberView('late',this)" id="tab-late">Late Tasks</button>
      <button class="view-tab" onclick="setMemberView('important',this)">Important</button>
      <button class="view-tab" onclick="setMemberView('planned',this)">Planned</button>
      <button class="view-tab" onclick="setMemberView('all',this)">All Tasks</button>
      <button class="view-tab" onclick="setMemberView('completed',this)">Completed</button>
    </div>
    <div class="content" id="main-content"></div>
  </div>
</div>

<!-- TASK MODAL -->
<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <h3 id="task-modal-title">Add Task</h3>
    <div class="form-group"><label>Task Title</label><input type="text" id="t-title" placeholder="What needs to be done?"></div>
    <div class="form-group"><label>Notes</label><textarea id="t-notes" rows="2" placeholder="Add a note…"></textarea></div>
    <div class="row-2">
      <div class="form-group"><label>Assigned To</label><select id="t-member"></select></div>
      <div class="form-group"><label>Priority</label>
        <select id="t-priority">
          <option value="none">None</option>
          <option value="low">🟢 Low</option>
          <option value="medium">🟡 Medium</option>
          <option value="high">🔴 High</option>
        </select>
      </div>
    </div>
    <div class="row-2">
      <div class="form-group"><label>Due Date</label><input type="date" id="t-due"></div>
      <div class="form-group"><label>Due Time (optional)</label><input type="time" id="t-time"></div>
    </div>
    <div class="row-2">
      <div class="form-group"><label>List</label><select id="t-list-sel"><option value="">No list</option></select></div>
      <div class="form-group"><label>Repeats</label>
        <select id="t-recur">
          <option value="">Does not repeat</option>
          <option value="daily">Every day</option>
          <option value="weekdays">Weekdays (Mon–Fri)</option>
          <option value="weekly">Every week</option>
          <option value="biweekly">Every 2 weeks</option>
          <option value="monthly">Every month</option>
          <option value="yearly">Every year</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;text-transform:none;font-size:.88rem;font-weight:500">
        <input type="checkbox" id="t-add-to-cal" style="width:auto"> Add to Google Calendar
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('task-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<!-- LIST MODAL -->
<div class="modal-overlay" id="list-modal">
  <div class="modal" style="max-width:400px">
    <h3 id="list-modal-title">Create List</h3>
    <div class="form-group"><label>List Name</label><input type="text" id="l-name" placeholder="e.g. Grocery List…" maxlength="40"></div>
    <div class="form-group"><label>Icon / Emoji</label><div class="avatar-emoji-grid" id="list-emoji-grid"></div></div>
    <div class="form-group"><label>Color</label><div style="display:flex;gap:8px;flex-wrap:wrap" id="list-color-grid"></div></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('list-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveList()">Save List</button>
    </div>
  </div>
</div>

<!-- MEMBER MODAL -->
<div class="modal-overlay" id="member-modal">
  <div class="modal" style="max-width:420px">
    <h3 id="member-modal-title">Edit Member</h3>
    <div class="avatar-picker">
      <div class="avatar-preview" id="av-preview" onclick="document.getElementById('av-upload').click()">😊</div>
      <div style="flex:1">
        <label style="display:block;font-size:.82rem;font-weight:600;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em">Profile Photo</label>
        <input type="file" id="av-upload" class="avatar-upload-input" accept="image/*" onchange="handleAvatarUpload(event)">
        <div style="font-size:.78rem;color:var(--text3);margin-bottom:10px">Upload a photo or pick an emoji below</div>
        <div class="avatar-emoji-grid" id="member-emoji-grid"></div>
      </div>
    </div>
    <div class="form-group"><label>Name</label><input type="text" id="av-name" placeholder="Member name" maxlength="24"></div>
    <div class="form-group"><label>Color</label><div style="display:flex;gap:8px;flex-wrap:wrap" id="member-color-grid"></div></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('member-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveMember()">Save</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
// ══════════════════════════════════════
// FIREBASE CONFIG
// ══════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDJ6p8LxMFhFn31SEyF_NeqyVetxlv3gb0",
  authDomain: "boyle-family-hub-2533b.firebaseapp.com",
  databaseURL: "https://boyle-family-hub-2533b-default-rtdb.firebaseio.com",
  projectId: "boyle-family-hub-2533b",
  storageBucket: "boyle-family-hub-2533b.firebasestorage.app",
  messagingSenderId: "603208983666",
  appId: "1:603208983666:web:7573f19352c8466d6d0eeb",
  measurementId: "G-VWCN0V57K8"
};
var _fbApp=null, _fbDb=null, _fbListening=false;
function getDb() {
  if (_fbDb) return _fbDb;
  try {
    _fbApp = firebase.apps.length ? firebase.apps[0] : firebase.initializeApp(FIREBASE_CONFIG);
    _fbDb = firebase.database(); return _fbDb;
  } catch(e) { console.error('Firebase init error:',e); return null; }
}

// ══════════════════════════════════════
// SETUP
// ══════════════════════════════════════
var setupMembersList = [];
var SETUP_COLORS = ['#1a7fe8','#e84a6f','#18c97a','#f0960a','#38b2ac','#8b5cf6','#5ab4ff','#f6ad55','#fc8181'];
function setupShowMsg(txt,isErr){var el=document.getElementById('setup-msg');if(!el)return;el.textContent=txt;el.style.color=isErr?'#e84a6f':'#18c97a';}
function setupRenderMembers(){
  var el=document.getElementById('member-list-setup');if(!el)return;
  if(!setupMembersList.length){el.innerHTML='<span style="font-size:.78rem;color:var(--text3)">No members added yet</span>';return;}
  el.innerHTML=setupMembersList.map((m,i)=>`<div style="display:inline-flex;align-items:center;gap:6px;background:${m.color}22;border:1px solid ${m.color}55;border-radius:20px;padding:5px 10px 5px 8px;font-size:.85rem;margin:3px"><span style="width:20px;height:20px;border-radius:50%;background:${m.color};display:inline-flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff">${m.name[0].toUpperCase()}</span><span style="color:var(--text)">${m.name}</span><span onclick="setupRemoveMember(${i})" style="cursor:pointer;color:var(--text3);font-size:1.1rem;line-height:1;padding:0 2px">&times;</span></div>`).join('');
}
function setupRemoveMember(i){setupMembersList.splice(i,1);setupRenderMembers();}
function setupDoAdd(){
  var inp=document.getElementById('new-member-name');if(!inp)return;
  var name=inp.value.trim();if(!name){setupShowMsg('Type a name first',true);return;}
  if(setupMembersList.length>=9){setupShowMsg('Maximum 9 members',true);return;}
  setupMembersList.push({name,color:SETUP_COLORS[setupMembersList.length%SETUP_COLORS.length],id:String(Date.now()+Math.random()),avatar:null});
  inp.value='';inp.focus();setupShowMsg('');setupRenderMembers();
}
function setupDoLaunch(){
  setupShowMsg('Launching...');
  if(!setupMembersList.length) setupMembersList=[
    {name:'Dad',color:'#1a7fe8',id:String(Date.now()+1),avatar:null},
    {name:'Mom',color:'#e84a6f',id:String(Date.now()+2),avatar:null},
    {name:'Child 1',color:'#18c97a',id:String(Date.now()+3),avatar:null}
  ];
  state.members=setupMembersList;
  state.lists=[{id:'l1',name:'Grocery List',emoji:'🛒',color:'#18c97a'},{id:'l2',name:'Tech Checklist',emoji:'🔧',color:'#1a7fe8'},{id:'l3',name:'Home Tasks',emoji:'🏠',color:'#f0960a'}];
  state.gcalKey=document.getElementById('setup-gcal-key').value.trim();
  state.gcalId=document.getElementById('setup-gcal-id').value.trim();
  saveConfigToFirebase();
  localStorage.setItem('familyhub_v2',JSON.stringify({theme:state.theme,members:state.members,lists:state.lists,gcalKey:state.gcalKey,gcalId:state.gcalId}));
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('app').style.display='block';
  startApp();
}

window.onerror=function(msg,src,line){
  if(document.getElementById('app')&&document.getElementById('app').style.display==='block'){
    if(!document.getElementById('app-error-banner')){
      var b=document.createElement('div');b.id='app-error-banner';
      b.style.cssText='position:fixed;top:0;left:0;right:0;background:#e84a6f;color:#fff;padding:10px 16px;font-size:.82rem;z-index:99999;display:flex;justify-content:space-between;align-items:center';
      b.innerHTML='<span>⚠️ Error: '+msg+' (line '+line+')</span><button onclick="this.parentElement.remove()" style="background:none;border:none;color:#fff;cursor:pointer;font-size:1.1rem">×</button>';
      document.body.prepend(b);
    }
  }return false;
};

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
const COLORS=['#1a7fe8','#e84a6f','#18c97a','#f0960a','#38b2ac','#8b5cf6','#5ab4ff','#f6ad55','#fc8181'];
const LIST_EMOJIS=['📋','🛒','🏠','💼','📚','🎯','💡','🔧','✈️','🎮','🏋️','🍕','💊','🎓','🔑','🌿','🎨','🎵'];

function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  const btn=document.getElementById('theme-btn');
  if(btn)btn.textContent=t==='dark'?'🌙':'☀️';
}
function toggleTheme(){state.theme=state.theme==='dark'?'light':'dark';applyTheme(state.theme);saveConfigToFirebase();}
function closeModal(id){document.getElementById(id).classList.remove('open');}

function startApp(){
  try{
    applyTheme(state.theme);
    document.getElementById('setup-screen').style.display='none';
    document.getElementById('app').style.display='block';
    renderSidebar();renderSidebarLists();setView('tasks');startFirebaseListener();
  }catch(err){console.error('startApp error:',err);}
}
function renderSidebar(){
  document.getElementById('sidebar-members').innerHTML=state.members.map(m=>`
    <button class="member-btn" data-member="${m.id}" onclick="selectMember('${m.id}',this)">
      <span class="m-avatar" style="background:${m.color}22;color:${m.color}">${memberAvatarHtml(m,30)}</span>
      <span>${escHtml(m.name)}</span>
      <span class="m-count" id="count-${m.id}">0</span>
    </button>`).join('');
  updateCounts();
  const sel=document.getElementById('t-member');
  if(sel)sel.innerHTML='<option value="family">All Family</option>'+state.members.map(m=>`<option value="${m.id}">${escHtml(m.name)}</option>`).join('');
  renderTaskListSelect();
}
function memberAvatarHtml(m,size){
  if(m.avatar&&m.avatar.startsWith('data:'))return`<img src="${m.avatar}" style="width:${size}px;height:${size}px;object-fit:cover;border-radius:50%">`;
  if(m.avatar&&m.avatar.length<=4)return m.avatar;
  return m.name[0].toUpperCase();
}
function renderSidebarLists(){
  document.getElementById('sidebar-lists').innerHTML=state.lists.map(l=>{
    const count=state.tasks.filter(t=>t.listId===l.id&&!t.completed).length;
    return`<button class="list-btn ${state.currentListId===l.id&&state.mainView==='list'?'active':''}" onclick="openList('${l.id}')">
      <span class="list-icon" style="background:${l.color}22;color:${l.color}">${l.emoji}</span>
      <span>${escHtml(l.name)}</span>
      ${count>0?`<span class="list-count">${count}</span>`:''}
      <button class="list-del" onclick="deleteList('${l.id}',event)" title="Delete list">×</button>
    </button>`;
  }).join('');
  renderTaskListSelect();
}
function renderTaskListSelect(){
  const sel=document.getElementById('t-list-sel');if(!sel)return;
  sel.innerHTML='<option value="">No list</option>'+state.lists.map(l=>`<option value="${l.id}">${l.emoji} ${escHtml(l.name)}</option>`).join('');
}
function updateCounts(){
  const active=state.tasks.filter(t=>!t.completed);
  const famEl=document.getElementById('count-family');if(famEl)famEl.textContent=active.length;
  state.members.forEach(m=>{const el=document.getElementById('count-'+m.id);if(el)el.textContent=active.filter(t=>t.member===String(m.id)).length;});

function selectMember(id,btn){

  setTimeout(()=>{
    const lt=document.getElementById('tab-late');

function openList(listId){

function getFilteredTasks(){
  let tasks=[...state.tasks];
  const mid=state.currentMember;
  if(mid!=='family')tasks=tasks.filter(t=>String(t.member)===String(mid));
  const today=todayStr();
  switch(state.currentView){
    case'myday':tasks=tasks.filter(t=>!t.completed&&(t.dueDate===today||!t.dueDate));break;
    case'late':tasks=tasks.filter(t=>!t.completed&&t.dueDate&&t.dueDate<today);break;
    case'important':tasks=tasks.filter(t=>!t.completed&&t.priority==='high');break;
    case'planned':tasks=tasks.filter(t=>!t.completed&&t.dueDate);break;
    case'completed':tasks=tasks.filter(t=>t.completed);break;
  }
  return tasks;
}
function renderTasksView(){
  const tasks=getFilteredTasks();
  const incomplete=tasks.filter(t=>!t.completed);
  const complete=tasks.filter(t=>t.completed);
  const today=todayStr();
  let html='';
  if(state.currentView==='myday'&&state.currentMember!=='family'){
    html+=`<div style="margin-bottom:18px"><div style="font-family:'DM Serif Display',serif;font-size:1.45rem;margin-bottom:2px">My Day</div><div style="font-size:.8rem;color:var(--text3)">${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div></div>`;
  }
  if(state.currentView==='late'&&state.currentMember!=='family'){
    html+=`<div style="margin-bottom:18px"><div style="font-family:'DM Serif Display',serif;font-size:1.45rem;margin-bottom:2px;color:var(--accent2)">Late Tasks</div><div style="font-size:.8rem;color:var(--text3)">Tasks past their due date</div></div>`;
  }
  if(state.currentMember!=='family'){const total=incomplete.length+complete.length;const pct=total?Math.round(complete.length/total*100):0;html+=`<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;}
  html+=`<div class="add-task-bar"><svg width="15" height="15" fill="none" stroke="var(--text3)" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg><input type="text" placeholder="Add a task… press Enter" id="quick-add-input" onkeydown="if(event.key==='Enter')quickAddTask()"><button class="btn btn-primary btn-sm" onclick="openAddTask()">Details</button></div>
  <div class="filters"><button class="filter-chip active" onclick="filterTasks('all',this)">All</button><button class="filter-chip" onclick="filterTasks('high',this)">🔴 High</button><button class="filter-chip" onclick="filterTasks('medium',this)">🟡 Medium</button><button class="filter-chip" onclick="filterTasks('today',this)">📅 Today</button><button class="filter-chip" onclick="filterTasks('overdue',this)">⚠️ Overdue</button></div>`;
  if(!incomplete.length&&!complete.length)html+=`<div class="tasks-empty"><span class="emoji">✅</span><div style="font-weight:600">Nothing here yet</div><div style="font-size:.8rem;margin-top:5px">Add a task above</div></div>`;
  if(incomplete.length)html+=`<div class="section-title">Active (${incomplete.length})</div>`+incomplete.map(t=>renderTaskItem(t,today)).join('');
  if(complete.length)html+=`<div class="section-title" style="margin-top:22px">Completed (${complete.length})</div>`+complete.map(t=>renderTaskItem(t,today)).join('');
  document.getElementById('main-content').innerHTML=html;
}
function renderListView(){
  const list=state.lists.find(l=>l.id===state.currentListId);if(!list){renderTasksView();return;}
  const tasks=state.tasks.filter(t=>t.listId===list.id);
  const incomplete=tasks.filter(t=>!t.completed);const complete=tasks.filter(t=>t.completed);const today=todayStr();
  let html=`<div class="list-view-header"><div class="list-view-icon" style="background:${list.color}22;color:${list.color}">${list.emoji}</div><div><div class="list-view-name">${escHtml(list.name)}</div><div class="list-view-count">${incomplete.length} active · ${complete.length} completed</div></div></div>
  <div class="add-task-bar"><svg width="15" height="15" fill="none" stroke="var(--text3)" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg><input type="text" placeholder="Add item to ${escHtml(list.name)}…" id="quick-add-input" onkeydown="if(event.key==='Enter')quickAddToList('${list.id}')"><button class="btn btn-primary btn-sm" onclick="openAddTaskToList('${list.id}')">Details</button></div>`;
  if(!incomplete.length&&!complete.length)html+=`<div class="tasks-empty"><span class="emoji">${list.emoji}</span><div style="font-weight:600">List is empty</div><div style="font-size:.8rem;margin-top:5px">Add items above</div></div>`;
  if(incomplete.length)html+=`<div class="section-title">Items (${incomplete.length})</div>`+incomplete.map(t=>renderTaskItem(t,today)).join('');
  if(complete.length)html+=`<div class="section-title" style="margin-top:20px">Completed</div>`+complete.map(t=>renderTaskItem(t,today)).join('');
  document.getElementById('main-content').innerHTML=html;
}
function renderTaskItem(t,today){
  const member=state.members.find(m=>String(m.id)===String(t.member));
  const color=member?member.color:'var(--accent)';
  const list=t.listId?state.lists.find(l=>l.id===t.listId):null;
  const dueClass=t.dueDate?(t.dueDate<today?'overdue':t.dueDate===today?'today':''):'';
  const dueLabel=t.dueDate?(t.dueDate<today?'⚠ Overdue':t.dueDate===today?'📅 Today':'📅 '+formatDate(t.dueDate)):'';
  const prioMap={high:'🔴 High',medium:'🟡 Med',low:'🟢 Low'};
  return`<div class="task-item ${t.completed?'completed':''}" id="task-${t.id}">
    <button class="task-check ${t.completed?'done':''}" onclick="toggleTask('${t.id}',event)" style="${t.completed?'':'border-color:'+color}"></button>
    <div class="task-body">
      <div class="task-title">${escHtml(t.title)}</div>
      <div class="task-meta">
        ${t.dueDate?`<span class="task-due ${dueClass}">${dueLabel}</span>`:''}
        ${t.priority&&t.priority!=='none'?`<span class="${t.priority==='high'?'prio-high':t.priority==='medium'?'prio-med':'prio-low'}">${prioMap[t.priority]||''}</span>`:''}
        ${list?`<span class="task-tag" style="background:${list.color}22;color:${list.color}">${list.emoji} ${escHtml(list.name)}</span>`:''}
        ${state.currentMember==='family'&&member?`<span class="assigned-tag"><span class="mini-av" style="background:${color}33;color:${color}">${memberAvatarHtml(member,15)}</span>${escHtml(member.name)}</span>`:''}
        ${t.addedToCal===true||t.addedToCal==='true'?`<span class="task-tag" style="background:#1a7fe822;color:#5ab4ff">📅 Cal</span>`:''}
      </div>
      ${t.dueTime?`<div><span class="task-due" style="color:var(--accent4)">⏰ ${formatTime(t.dueTime)}</span></div>`:''}
      ${t.recurrence?`<div><span class="task-tag" style="background:rgba(26,127,232,.15);color:var(--accent5)">↻ ${recurLabel(t.recurrence)}</span></div>`:''}
      ${t.notes?`<div style="font-size:.76rem;color:var(--text3);margin-top:4px">${escHtml(t.notes)}</div>`:''}
    </div>
    <div class="task-actions">
      <button class="task-action-btn" onclick="editTask('${t.id}',event)"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
      <button class="task-action-btn del" onclick="deleteTask('${t.id}',event)"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg></button>
    </div>
  </div>`;
}
function filterTasks(type,btn){
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));if(btn)btn.classList.add('active');
  const today=todayStr();
  document.querySelectorAll('.task-item').forEach(el=>{
    const id=el.id.replace('task-','');const t=state.tasks.find(x=>String(x.id)===id);if(!t)return;
    let show=true;
    if(type==='high')show=t.priority==='high'&&!t.completed;
    else if(type==='medium')show=t.priority==='medium'&&!t.completed;
    else if(type==='today')show=t.dueDate===today&&!t.completed;
    else if(type==='overdue')show=t.dueDate&&t.dueDate<today&&!t.completed;
    el.style.display=show?'':'none';
  });
}

function quickAddTask(){const inp=document.getElementById('quick-add-input');const title=inp.value.trim();if(!title)return;pushTask(makeTask(title,{member:state.currentMember==='family'?'family':state.currentMember}),'add');toast('Task added!','success');inp.value='';}
function quickAddToList(listId){const inp=document.getElementById('quick-add-input');const title=inp.value.trim();if(!title)return;pushTask(makeTask(title,{member:'family',listId}),'add');toast('Added!','success');inp.value='';}
function makeTask(title,overrides={}){return{id:genId(),title,notes:'',member:'family',priority:'none',dueDate:'',dueTime:'',recurrence:'',listId:'',completed:false,completedAt:'',createdAt:new Date().toISOString(),addedToCal:false,...overrides};}
function nextRecurDate(task){
  if(!task.dueDate||!task.recurrence)return null;
  const d=new Date(task.dueDate+'T12:00:00');
  switch(task.recurrence){case'daily':d.setDate(d.getDate()+1);break;case'weekdays':d.setDate(d.getDate()+1);while(d.getDay()===0||d.getDay()===6)d.setDate(d.getDate()+1);break;case'weekly':d.setDate(d.getDate()+7);break;case'biweekly':d.setDate(d.getDate()+14);break;case'monthly':d.setMonth(d.getMonth()+1);break;case'yearly':d.setFullYear(d.getFullYear()+1);break;default:return null;}
  return d.toISOString().split('T')[0];
}
function spawnRecurringTask(completedTask){
  if(!completedTask.recurrence)return;const next=nextRecurDate(completedTask);if(!next)return;
  pushTask(makeTask(completedTask.title,{notes:completedTask.notes,member:completedTask.member,priority:completedTask.priority,dueDate:next,dueTime:completedTask.dueTime,recurrence:completedTask.recurrence,listId:completedTask.listId,addedToCal:completedTask.addedToCal}),'add');
  toast('Recurring task scheduled for '+formatDate(next),'info');
}
function openAddTask(){
  state.editingTaskId=null;
  document.getElementById('task-modal-title').textContent='Add Task';
  ['t-title','t-notes','t-due','t-time','t-recur'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('t-priority').value='none';
  document.getElementById('t-add-to-cal').checked=false;
  document.getElementById('t-list-sel').value='';
  const sel=document.getElementById('t-member');
  if(sel)sel.value=state.currentMember!=='family'?state.currentMember:(state.members[0]?.id||'family');
  document.getElementById('task-modal').classList.add('open');
}
function openAddTaskToList(listId){openAddTask();document.getElementById('t-list-sel').value=listId;}
function editTask(id,e){
  if(e)e.stopPropagation();const t=state.tasks.find(x=>String(x.id)===String(id));if(!t)return;
  state.editingTaskId=id;
  document.getElementById('task-modal-title').textContent='Edit Task';
  document.getElementById('t-title').value=t.title;
  document.getElementById('t-notes').value=t.notes||'';
  document.getElementById('t-due').value=t.dueDate||'';
  document.getElementById('t-priority').value=t.priority||'none';
  document.getElementById('t-add-to-cal').checked=t.addedToCal===true||t.addedToCal==='true';
  document.getElementById('t-member').value=t.member;
  document.getElementById('t-list-sel').value=t.listId||'';
  document.getElementById('t-time').value=t.dueTime||'';
  document.getElementById('t-recur').value=t.recurrence||'';
  document.getElementById('task-modal').classList.add('open');
}
function saveTask(){
  const title=document.getElementById('t-title').value.trim();if(!title){toast('Please enter a task title','error');return;}
  const addToCal=document.getElementById('t-add-to-cal').checked;const dueDate=document.getElementById('t-due').value;
  const fields={notes:document.getElementById('t-notes').value,member:document.getElementById('t-member').value,priority:document.getElementById('t-priority').value,dueDate,dueTime:document.getElementById('t-time').value,recurrence:document.getElementById('t-recur').value,listId:document.getElementById('t-list-sel').value,addedToCal:addToCal};
  if(state.editingTaskId){
    const idx=state.tasks.findIndex(x=>String(x.id)===String(state.editingTaskId));
    if(idx>-1){pushTask(Object.assign({},state.tasks[idx],fields),'update');toast('Updated!','success');}
  }else{
    const task=makeTask(title,fields);pushTask(task,'add');toast('Task added!','success');
    if(addToCal&&dueDate)addToGoogleCalendar(task);
  }
  closeModal('task-modal');
}
function toggleTask(id,e){
  if(e)e.stopPropagation();const t=state.tasks.find(x=>String(x.id)===String(id));if(!t)return;
  const u=Object.assign({},t,{completed:!t.completed,completedAt:!t.completed?new Date().toISOString():''});
  pushTask(u,'update');
  if(u.completed){confettiTask();if(u.recurrence)spawnRecurringTask(u);}
}
function deleteTask(id,e){if(e)e.stopPropagation();if(!confirm('Delete this task?'))return;pushTask({id},'delete');toast('Deleted','info');}

// ══════════════════════════════════════
// CELEBRATION
// ══════════════════════════════════════
const CELEB_MESSAGES=[{emoji:'🎉',title:'Task crushed!',sub:'One down, greatness continues.'},{emoji:'⭐',title:'Nailed it!',sub:'The Boyle family gets things done.'},{emoji:'🏆',title:'Winner!',sub:'Another one bites the dust.'},{emoji:'🚀',title:'Blasted off!',sub:'To the moon and back.'}];
function confettiTask(){launchConfetti();showCelebMessage();}
function launchConfetti(){
  const old=document.getElementById('confetti-canvas');if(old)old.remove();
  const canvas=document.createElement('canvas');canvas.id='confetti-canvas';canvas.width=window.innerWidth;canvas.height=window.innerHeight;document.body.appendChild(canvas);
  const ctx=canvas.getContext('2d');
  const COLS=['#1a7fe8','#e84a6f','#18c97a','#f0960a','#38b2ac','#8b5cf6','#5ab4ff','#fbbf24','#34d399'];
  const SHAPES=['circle','rect','triangle'];
  const pieces=Array.from({length:120},()=>({x:Math.random()*canvas.width,y:-20-Math.random()*200,r:4+Math.random()*7,color:COLS[Math.floor(Math.random()*COLS.length)],shape:SHAPES[Math.floor(Math.random()*SHAPES.length)],vx:(Math.random()-.5)*5,vy:3+Math.random()*5,spin:(Math.random()-.5)*.3,angle:Math.random()*Math.PI*2,opacity:1,wobble:Math.random()*Math.PI*2,wobbleSpeed:.05+Math.random()*.05}));
  let frame=0;const maxFrames=160;
  function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);pieces.forEach(p=>{p.y+=p.vy;p.x+=p.vx;p.angle+=p.spin;p.wobble+=p.wobbleSpeed;p.x+=Math.sin(p.wobble)*1.5;p.vy+=.12;if(frame>maxFrames*.6)p.opacity=Math.max(0,p.opacity-.025);ctx.save();ctx.globalAlpha=p.opacity;ctx.fillStyle=p.color;ctx.translate(p.x,p.y);ctx.rotate(p.angle);if(p.shape==='circle'){ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();}else if(p.shape==='rect'){ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);}else{ctx.beginPath();ctx.moveTo(0,-p.r);ctx.lineTo(p.r,p.r);ctx.lineTo(-p.r,p.r);ctx.closePath();ctx.fill();}ctx.restore();});frame++;if(frame<maxFrames)requestAnimationFrame(draw);else canvas.remove();}
  requestAnimationFrame(draw);
}
function showCelebMessage(){

function renderOverview(){

    const overdue=active.filter(t=>t.dueDate&&t.dueDate<today);
    const total=active.length+done.length;const pct=total===0?0:Math.round(done.length/total*100);const allDone=total>0&&pct===100;
    const barColor=allDone?'#18c97a':overdue.length>0?`linear-gradient(90deg,${m.color},var(--accent2))`:`linear-gradient(90deg,${m.color},${m.color}cc)`;

function renderCalendar(){
  document.getElementById('view-tabs').style.display='none';
  const{calMonth:month,calYear:year}=state;
  const monthName=new Date(year,month,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const todayStr2=todayStr();const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();const daysInPrev=new Date(year,month,0).getDate();
  let html=`<div class="gcal-banner"><svg width="20" height="20" viewBox="0 0 24 24"><rect width="24" height="24" rx="3" fill="#1a7fe8"/><rect x="3" y="11" width="18" height="10" rx="1" fill="white" opacity=".2"/><text x="12" y="19" font-size="8" fill="white" text-anchor="middle" font-family="sans-serif" font-weight="bold">CAL</text></svg><p>${state.gcalKey?'✅ Google Calendar linked.':'🔗 <a href="#" onclick="setView(\'settings\')">Link Google Calendar in Settings →</a>'}</p></div>
  <div class="cal-nav"><button class="icon-btn" onclick="calPrev()">‹</button><h3>${monthName}</h3><button class="icon-btn" onclick="calNext()">›</button><button class="btn btn-ghost btn-sm" onclick="calToday()">Today</button></div>
  <div class="cal-grid">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-header-cell">${d}</div>`).join('')}`;
  const totalCells=Math.ceil((firstDay+daysInMonth)/7)*7;
  for(let i=0;i<totalCells;i++){
    let day,isOther=false,ds;
    if(i<firstDay){day=daysInPrev-firstDay+i+1;isOther=true;const pm=month===0?12:month;const py=month===0?year-1:year;ds=`${py}-${pad(pm)}-${pad(day)}`;}
    else if(i>=firstDay+daysInMonth){day=i-firstDay-daysInMonth+1;isOther=true;const nm=month===11?1:month+2;const ny=month===11?year+1:year;ds=`${ny}-${pad(nm)}-${pad(day)}`;}
    else{day=i-firstDay+1;ds=`${year}-${pad(month+1)}-${pad(day)}`;}
    const isToday=ds===todayStr2;
    const dayTasks=state.tasks.filter(t=>t.dueDate===ds&&!t.completed);
    const m2=state.currentMember!=='family'?state.members.find(m=>String(m.id)===String(state.currentMember)):null;
    const ft=m2?dayTasks.filter(t=>String(t.member)===String(m2.id)):dayTasks;
    html+=`<div class="cal-cell ${isOther?'other-month':''} ${isToday?'today':''}" onclick="calDayClick('${ds}')"><div class="cal-day-num">${day}</div>${ft.slice(0,3).map(t=>{const tm=state.members.find(m=>String(m.id)===String(t.member));const c=tm?tm.color:'var(--accent)';return`<div class="cal-task-dot"><span class="dot" style="background:${c}"></span>${escHtml(t.title.substring(0,16))}${t.title.length>16?'…':''}</div>`;}).join('')}${ft.length>3?`<div style="font-size:.66rem;color:var(--text3)">+${ft.length-3} more</div>`:''}</div>`;
  }
  html+='</div>';document.getElementById('main-content').innerHTML=html;
}
function calPrev(){state.calMonth--;if(state.calMonth<0){state.calMonth=11;state.calYear--;}renderCalendar();}
function calNext(){state.calMonth++;if(state.calMonth>11){state.calMonth=0;state.calYear++;}renderCalendar();}
function calToday(){state.calMonth=new Date().getMonth();state.calYear=new Date().getFullYear();renderCalendar();}

function importReadFile(file){
  if(!file.name.toLowerCase().endsWith('.csv')&&file.type!=='text/csv'){toast('Please upload a .csv file','error');return;}
  const reader=new FileReader();
  reader.onload=e=>importParseCSV(e.target.result);

function importParsePastedCSV(){
  const text=document.getElementById('csv-paste-area').value.trim();
  if(!text){toast('Paste some CSV content first','error');return;}
  importParseCSV(text);
}

function importParseCSV(text){
  // Handle both \r\n and \n line endings
  const lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(l=>l.trim());
  if(lines.length<1){toast('CSV appears to be empty','error');return;}

  function parseCSVLine(line){
    const result=[];let cur='';let inQuotes=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){if(inQuotes&&line[i+1]==='"'){cur+='"';i++;}else inQuotes=!inQuotes;}
      else if(ch===','&&!inQuotes){result.push(cur.trim());cur='';}
      else cur+=ch;
    }
    result.push(cur.trim());return result;
  }

  importHeaders=parseCSVLine(lines[0]);
  importParsedRows=lines.slice(1).map(l=>parseCSVLine(l));
  importShowMapping();
}

async function importFetchSheets(){
  const url=document.getElementById('sheets-url-input').value.trim();
  if(!url){toast('Paste a Google Sheets URL','error');return;}
  const statusEl=document.getElementById('sheets-status');
  statusEl.textContent='Fetching…';statusEl.style.color='var(--accent5)';

  // Extract spreadsheet ID from URL
  const match=url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
  if(!match){toast('Could not find a spreadsheet ID in that URL','error');statusEl.textContent='';return;}
  const sheetId=match[1];

  // Use Google Sheets CSV export endpoint (works for public/shared sheets)
  const csvUrl=`https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&id=${sheetId}`;
  try{
    const resp=await fetch(csvUrl);
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const text=await resp.text();
    statusEl.textContent='✅ Sheet fetched successfully!';statusEl.style.color='var(--accent3)';
    importParseCSV(text);
  }catch(err){
    console.error('Sheets fetch error:',err);
    statusEl.innerHTML='❌ Could not fetch sheet. Make sure it is shared as <strong>"Anyone with the link can view"</strong> and try again.';
    statusEl.style.color='var(--accent2)';
    toast('Failed to fetch Google Sheet','error');
  }
}

function importShowMapping(){
  if(!importHeaders.length){toast('No headers found in file','error');return;}
  const section=document.getElementById('import-mapping-section');section.style.display='';

  // Auto-detect column mappings by common header names
  const fieldMap={
    title:   ['title','task','name','todo','item','subject','summary','description'],
    notes:   ['notes','note','detail','details','description','body','comment','comments'],
    dueDate: ['due','duedate','due date','date','deadline','due_date','end date','enddate'],
    priority:['priority','prio','importance','urgent'],
    member:  ['assigned','assignee','member','person','owner','who','assigned to'],
    listId:  ['list','category','group','project','bucket','tag']
  };
  const TASK_FIELDS=['title','notes','dueDate','priority','member','listId'];
  const FIELD_LABELS={title:'Task Title *',notes:'Notes',dueDate:'Due Date',priority:'Priority',member:'Assigned To',listId:'List'};

  function autoDetect(field){
    const keywords=fieldMap[field]||[];
    for(let i=0;i<importHeaders.length;i++){
      const h=importHeaders[i].toLowerCase().trim();
      if(keywords.some(k=>h===k||h.includes(k)))return String(i);
    }
    return'';
  }

  const headerOpts='<option value="">— Skip —</option>'+importHeaders.map((h,i)=>`<option value="${i}">${escHtml(h)}</option>`).join('');

async function importExecute(){
  const titleCol=document.getElementById('map-title')?.value;
  if(titleCol===''){toast('You must map the Title column','error');return;}

  const getCol=(field)=>document.getElementById('map-'+field)?.value;
  const skipHeader=document.getElementById('imp-skip-header')?.value==='yes';
  const defaultMember=document.getElementById('imp-default-member')?.value||'family';
  const defaultPriority=document.getElementById('imp-default-priority')?.value||'none';
  const defaultListId=document.getElementById('imp-default-list')?.value||'';

  const rows=skipHeader?importParsedRows:importParsedRows;// header already stripped in parse
  let imported=0,skipped=0;

  // Priority normalizer
  function normPriority(val){
    if(!val)return defaultPriority;
    const v=val.toLowerCase().trim();
    if(v==='high'||v==='h'||v==='3'||v==='urgent')return'high';
    if(v==='medium'||v==='med'||v==='m'||v==='2'||v==='normal')return'medium';
    if(v==='low'||v==='l'||v==='1')return'low';
    return defaultPriority;
  }
  // Date normalizer — handles MM/DD/YYYY, YYYY-MM-DD, M/D/YY, etc.
  function normDate(val){
    if(!val||!val.trim())return'';
    const v=val.trim();
    // Already ISO
    if(/^\d{4}-\d{2}-\d{2}$/.test(v))return v;
    // Try native Date parse
    const d=new Date(v);
    if(!isNaN(d.getTime()))return d.toISOString().split('T')[0];
    return'';
  }
  // Member resolver — try matching by name
  function resolveMemeber(val){
    if(!val||!val.trim())return defaultMember;
    const v=val.trim().toLowerCase();
    const found=state.members.find(m=>m.name.toLowerCase()===v);
    return found?found.id:defaultMember;
  }
  // List resolver — try matching by name
  function resolveList(val){
    if(!val||!val.trim())return defaultListId;
    const v=val.trim().toLowerCase();
    const found=state.lists.find(l=>l.name.toLowerCase()===v);
    return found?found.id:defaultListId;
  }

  const tc=parseInt(getCol('title'));
  const nc=getCol('notes')!==''?parseInt(getCol('notes')):-1;
  const dc=getCol('dueDate')!==''?parseInt(getCol('dueDate')):-1;
  const pc=getCol('priority')!==''?parseInt(getCol('priority')):-1;
  const mc=getCol('member')!==''?parseInt(getCol('member')):-1;
  const lc=getCol('listId')!==''?parseInt(getCol('listId')):-1;

  for(const row of rows){
    const title=(row[tc]||'').trim();
    if(!title){skipped++;continue;}
    const task=makeTask(title,{
      notes:nc>=0?(row[nc]||'').trim():'',
      dueDate:dc>=0?normDate(row[dc]):'',
      priority:pc>=0?normPriority(row[pc]):defaultPriority,
      member:mc>=0?resolveMemeber(row[mc]):defaultMember,
      listId:lc>=0?resolveList(row[lc]):defaultListId,
    });
    await pushTask(task,'add');
    imported++;
  }

  toast(`✅ Imported ${imported} task${imported!==1?'s':''}${skipped?' ('+skipped+' skipped)':''}!`,'success');
  importParsedRows=[];importHeaders=[];
  setTimeout(()=>{state.mainView='tasks';state.currentMember='family';selectMember('family',document.querySelector('[data-member="family"]'));},800);
}

function importReset(){
  importParsedRows=[];importHeaders=[];
  renderImport();
}

async function pushTask(task,action){
  const db=getDb();if(!db)return;
  try{
    if(action==='delete')await db.ref('tasks/'+task.id).remove();
    else await db.ref('tasks/'+task.id).set(task);
  }catch(e){console.error('pushTask error:',e);toast('Failed to save to Firebase','error');}
}
function saveConfigToFirebase(){
  const db=getDb();if(!db)return;
  db.ref('config').set({members:state.members.map(m=>({id:m.id,name:m.name,color:m.color,avatar:m.avatar||null})),lists:state.lists,gcalKey:state.gcalKey,gcalId:state.gcalId,theme:state.theme}).catch(e=>console.error('Config sync error:',e));
}
function startFirebaseListener(){
  if(_fbListening)return;const db=getDb();if(!db)return;
  _fbListening=true;setSyncStatus('syncing');
  db.ref('tasks').on('value',function(snap){
    const data=snap.val();
    if(data){state.tasks=Object.values(data).map(t=>Object.assign({},t,{completed:t.completed===true||t.completed==='true',addedToCal:t.addedToCal===true||t.addedToCal==='true'})).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));}
    else state.tasks=[];
    updateCounts();renderView();renderSidebarLists();state.lastSync=new Date();setSyncStatus('ok');
  },function(err){console.error('Firebase tasks error:',err);setSyncStatus('error');});
  db.ref('config').on('value',function(snap){
    const data=snap.val();
    if(data){
      let changed=false;
      if(data.members&&JSON.stringify(data.members)!==JSON.stringify(state.members)){state.members=data.members;changed=true;}
      if(data.lists&&JSON.stringify(data.lists)!==JSON.stringify(state.lists)){state.lists=data.lists;changed=true;}
      if(data.gcalKey!==undefined)state.gcalKey=data.gcalKey;
      if(data.gcalId!==undefined)state.gcalId=data.gcalId;
      if(data.theme!==undefined&&data.theme!==state.theme){state.theme=data.theme;applyTheme(state.theme);}
      localStorage.setItem('familyhub_v2',JSON.stringify({theme:state.theme,members:state.members,lists:state.lists,gcalKey:state.gcalKey,gcalId:state.gcalId}));
      if(changed){renderSidebar();renderSidebarLists();renderView();}
    }else saveConfigToFirebase();
  });
}
function setSyncStatus(s){
  const dot=document.getElementById('sync-dot'),txt=document.getElementById('sync-text');if(!dot)return;
  dot.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');
  txt.textContent=s==='syncing'?'Syncing…':s==='error'?'Sync error':state.lastSync?'Synced '+timeAgo(state.lastSync):'Connected';
}

function closeMassUpdate(){const m=document.getElementById('mass-update-modal');if(m)m.remove();}
function massUpdateRunFilter(){
  const fm=document.getElementById('mu-filter-member')?.value||'';
  const fp=document.getElementById('mu-filter-priority')?.value||'';
  const fl=document.getElementById('mu-filter-list')?.value||'';
  const fs=document.getElementById('mu-filter-status')?.value||'active';
  const fq=(document.getElementById('mu-filter-search')?.value||'').toLowerCase().trim();
  let tasks=[...state.tasks];
  if(fm)tasks=tasks.filter(t=>String(t.member)===fm);
  if(fp)tasks=tasks.filter(t=>(t.priority||'none')===fp);
  if(fl)tasks=tasks.filter(t=>(t.listId||'')===fl);
  if(fs==='active')tasks=tasks.filter(t=>!t.completed);
  if(fs==='completed')tasks=tasks.filter(t=>t.completed);
  if(fq)tasks=tasks.filter(t=>t.title.toLowerCase().includes(fq));
  const container=document.getElementById('mu-task-list');
  if(!tasks.length){container.innerHTML='<div style="padding:20px;text-align:center;color:var(--text3);font-size:.84rem">No tasks match this filter</div>';massUpdateSelectedCount();return;}
  const today=todayStr();
  container.innerHTML=tasks.map(t=>{
    const m=state.members.find(x=>String(x.id)===String(t.member));
    const lst=t.listId?state.lists.find(l=>l.id===t.listId):null;
    const overdue=!t.completed&&t.dueDate&&t.dueDate<today;
    return`<label style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s" onmouseover="this.style.background='var(--surface3)'" onmouseout="this.style.background=''">
      <input type="checkbox" class="mu-task-cb" data-id="${t.id}" style="width:15px;height:15px;cursor:pointer;flex-shrink:0" onchange="massUpdateSelectedCount()">

        <span style="font-size:.87rem;font-weight:500;${t.completed?'text-decoration:line-through;opacity:.5':''}">${escHtml(t.title)}</span>
        <span style="display:flex;gap:5px;flex-wrap:wrap;margin-top:2px">
          ${m?`<span style="font-size:.7rem;background:${m.color}22;color:${m.color};padding:1px 7px;border-radius:10px">${escHtml(m.name)}</span>`:''}
          ${lst?`<span style="font-size:.7rem;background:${lst.color}22;color:${lst.color};padding:1px 7px;border-radius:10px">${lst.emoji} ${escHtml(lst.name)}</span>`:''}
          ${t.dueDate?`<span style="font-size:.7rem;color:${overdue?'var(--accent2)':'var(--text3)'}">${overdue?'⚠':'📅'} ${formatDate(t.dueDate)}</span>`:''}
          ${t.priority&&t.priority!=='none'?`<span style="font-size:.7rem;color:${t.priority==='high'?'var(--accent2)':t.priority==='medium'?'var(--accent4)':'var(--accent3)'}">${{high:'🔴',medium:'🟡',low:'🟢'}[t.priority]}</span>`:''}

function massUpdateToggleActionFields(){
  const type=document.getElementById('mu-action-type')?.value;const wrap=document.getElementById('mu-action-value-wrap');if(!wrap)return;
  const mo=state.members.map(m=>`<option value="${m.id}">${escHtml(m.name)}</option>`).join('');
  const lo='<option value="">No list</option>'+state.lists.map(l=>`<option value="${l.id}">${l.emoji} ${escHtml(l.name)}</option>`).join('');
  const fields={reassign:`<label>Reassign To</label><select id="mu-action-val"><option value="family">All Family</option>${mo}</select>`,priority:`<label>New Priority</label><select id="mu-action-val"><option value="none">None</option><option value="low">🟢 Low</option><option value="medium">🟡 Medium</option><option value="high">🔴 High</option></select>`,due:`<label>New Due Date</label><input type="date" id="mu-action-val">`,list:`<label>Move to List</label><select id="mu-action-val">${lo}</select>`,complete:'',incomplete:'',delete:''};

async function massUpdateApply(){
  const type=document.getElementById('mu-action-type')?.value;if(!type){toast('Choose an action first','error');return;}
  const selectedIds=[...document.querySelectorAll('.mu-task-cb:checked')].map(cb=>cb.dataset.id);
  if(!selectedIds.length){toast('No tasks selected','error');return;}
  if(type==='delete'&&!confirm(`Permanently delete ${selectedIds.length} task${selectedIds.length!==1?'s':''}?`))return;
  const actionVal=document.getElementById('mu-action-val')?.value??'';
  let successCount=0;
  for(const id of selectedIds){
    const task=state.tasks.find(t=>String(t.id)===String(id));if(!task)continue;
    if(type==='delete'){await pushTask({id},'delete');}
    else{
      const u=Object.assign({},task);
      if(type==='reassign')u.member=actionVal;if(type==='priority')u.priority=actionVal;
      if(type==='due')u.dueDate=actionVal;if(type==='list')u.listId=actionVal;
      if(type==='complete'){u.completed=true;u.completedAt=new Date().toISOString();}
      if(type==='incomplete'){u.completed=false;u.completedAt='';}
      await pushTask(u,'update');
    }
    successCount++;
  }
  const labels={reassign:'Reassigned',priority:'Priority updated',due:'Due date set',list:'Moved to list',complete:'Marked complete',incomplete:'Marked incomplete',delete:'Deleted'};
  toast(`${labels[type]}: ${successCount} task${successCount!==1?'s':''}`, 'success');
  closeMassUpdate();
}

function renderView(){

  else if(state.mainView==='calendar')renderCalendar();
  else if(state.mainView==='settings')renderSettings();
  else if(state.mainView==='import')renderImport();
  else if(state.mainView==='list')renderListView();
  else renderTasksView();
}
function todayStr(){const d=new Date();return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function formatTime(t){if(!t)return'';try{const[h,m]=t.split(':');const hr=parseInt(h);return`${hr%12||12}:${m} ${hr<12?'AM':'PM'}`;}catch(e){return t;}}
function recurLabel(r){return{daily:'Daily',weekdays:'Weekdays',weekly:'Weekly',biweekly:'Every 2 wks',monthly:'Monthly',yearly:'Yearly'}[r]||r;}
function pad(n){return String(n).padStart(2,'0');}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function formatDate(d){if(!d)return'';const[y,m,day]=d.split('-');return new Date(y,m-1,day).toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function timeAgo(d){const diff=Math.round((new Date()-d)/1000);if(diff<60)return'just now';if(diff<3600)return Math.round(diff/60)+'m ago';return Math.round(diff/3600)+'h ago';}
function toast(msg,type='info'){
  const c=document.getElementById('toasts'),el=document.createElement('div');
  el.className=`toast ${type}`;
  el.innerHTML=`<span class="toast-icon">${{success:'✅',error:'❌',info:'ℹ️'}[type]||'ℹ️'}</span><span>${msg}</span>`;
  c.appendChild(el);setTimeout(()=>{el.classList.add('out');setTimeout(()=>el.remove(),250);},3500);
}

// ══════════════════════════════════════
// BOOT
// ══════════════════════════════════════
function _boot(){
  document.querySelectorAll('.modal-overlay').forEach(o=>{o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');});});
  const saved=localStorage.getItem('familyhub_v2');
  if(!saved){document.getElementById('setup-screen').style.display='flex';document.getElementById('app').style.display='none';}
  else{
    try{const c=JSON.parse(saved);if(c.theme)state.theme=c.theme;if(c.members)state.members=c.members;if(c.lists)state.lists=c.lists;if(c.gcalKey)state.gcalKey=c.gcalKey;if(c.gcalId)state.gcalId=c.gcalId;}catch(e){}
    startApp();
  }
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',_boot);
else setTimeout(_boot,0);
</script>
</body>
