<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boyle Family Hub — To-Do</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<style>
/* ── THEME VARIABLES ── */
[data-theme="dark"] {
  --bg: #0f0f13;
  --surface: #1a1a22;
  --surface2: #22222e;
  --surface3: #2a2a38;
  --border: rgba(255,255,255,0.07);
  --text: #eeeef5;
  --text2: #9090a8;
  --text3: #5a5a72;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --setup-bg: radial-gradient(ellipse at 60% 40%, #1e1840 0%, #0f0f13 70%);
  --modal-shadow: 0 24px 80px rgba(0,0,0,.6);
  --scrollbar-thumb: #2a2a38;
}
[data-theme="light"] {
  --bg: #f4f4f8;
  --surface: #ffffff;
  --surface2: #f0f0f5;
  --surface3: #e8e8f0;
  --border: rgba(0,0,0,0.08);
  --text: #1a1a2e;
  --text2: #5a5a7a;
  --text3: #9090aa;
  --shadow: 0 8px 32px rgba(0,0,0,0.1);
  --setup-bg: radial-gradient(ellipse at 60% 40%, #e8e4ff 0%, #f4f4f8 70%);
  --modal-shadow: 0 24px 80px rgba(0,0,0,.15);
  --scrollbar-thumb: #d0d0e0;
}
:root {
  --accent: #6c63ff;
  --accent2: #ff6584;
  --accent3: #43e97b;
  --accent4: #f7971e;
  --radius: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background .25s, color .25s;
}

/* ── SETUP SCREEN ── */
#setup-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  background: var(--setup-bg);
}
.setup-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 48px;
  width: 540px;
  max-width: 95vw;
  box-shadow: var(--shadow);
}
.setup-card h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 2.2rem;
  margin-bottom: 8px;
  background: linear-gradient(135deg, #a78bfa, #6c63ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.setup-card p { color: var(--text2); margin-bottom: 28px; font-size: .95rem; line-height: 1.6; }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: .82rem; font-weight: 600; color: var(--text2); margin-bottom: 6px; letter-spacing: .05em; text-transform: uppercase; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 11px 14px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-family: inherit; font-size: .95rem;
  outline: none; transition: border-color .2s, background .25s;
}
.form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
.member-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.member-chip {
  background: var(--surface3); border: 1px solid var(--border);
  border-radius: 20px; padding: 5px 12px 5px 8px;
  font-size: .85rem; display: flex; align-items: center; gap: 6px;
}
.member-chip .chip-avatar { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; display: inline-block; flex-shrink: 0; }
.member-chip .remove { color: var(--text3); font-size: 1rem; line-height: 1; cursor: pointer; }
.member-chip .remove:hover { color: var(--accent2); }
.add-member-row { display: flex; gap: 8px; margin-top: 8px; }
.add-member-row input { flex: 1; }
.btn {
  padding: 11px 22px; border-radius: 10px; border: none;
  font-family: inherit; font-weight: 600; font-size: .9rem;
  cursor: pointer; transition: all .15s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #5a52e0; transform: translateY(-1px); }
.btn-sm { padding: 8px 14px; font-size: .82rem; border-radius: 8px; }
.btn-ghost { background: var(--surface3); color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); background: var(--surface2); }
.divider { height: 1px; background: var(--border); margin: 24px 0; }
.step-label { font-size: .75rem; font-weight: 700; color: var(--accent); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 16px; }

/* ── MAIN APP ── */
#app { display: none; min-height: 100vh; }

/* SIDEBAR */
.sidebar {
  position: fixed; left: 0; top: 0; bottom: 0; width: 268px;
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; z-index: 100;
  transition: transform .25s ease, background .25s;
}
.sidebar-header {
  padding: 18px 18px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.sidebar-header .app-name {
  font-family: 'DM Serif Display', serif;
  font-size: 1.25rem;
  background: linear-gradient(135deg, #a78bfa, #6c63ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  flex: 1;
}
.sidebar-header .app-sub { font-size: .72rem; color: var(--text3); margin-top: 1px; }
.theme-toggle-btn {
  width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface2); cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: .9rem; transition: all .15s; flex-shrink: 0;
}
.theme-toggle-btn:hover { background: var(--surface3); border-color: var(--accent); }

.family-list { padding: 10px 8px; flex: 1; overflow-y: auto; }
.family-list-label { font-size: .68rem; font-weight: 700; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; padding: 6px 8px 8px; }
.member-btn {
  width: 100%; display: flex; align-items: center; gap: 9px;
  padding: 8px 9px; border-radius: 10px; border: none;
  background: transparent; color: var(--text2); font-family: inherit; font-size: .88rem;
  cursor: pointer; transition: all .15s; text-align: left;
}
.member-btn:hover { background: var(--surface2); color: var(--text); }
.member-btn.active { background: rgba(108,99,255,.12); color: var(--text); }
.member-btn .m-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: .75rem; font-weight: 700; flex-shrink: 0; overflow: hidden;
}
.member-btn .m-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.member-btn .m-count {
  margin-left: auto; background: var(--surface3); color: var(--text3);
  font-size: .7rem; font-weight: 600; padding: 2px 7px; border-radius: 20px;
}
.member-btn.active .m-count { background: var(--accent); color: #fff; }

.lists-section { padding: 6px 8px; border-top: 1px solid var(--border); }
.lists-section-header { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px 8px; }
.lists-section-label { font-size: .68rem; font-weight: 700; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; }
.add-list-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 1.1rem; line-height: 1; padding: 0 2px; transition: color .15s; }
.add-list-btn:hover { color: var(--accent); }
.list-btn {
  width: 100%; display: flex; align-items: center; gap: 9px;
  padding: 7px 9px; border-radius: 10px; border: none;
  background: transparent; color: var(--text2); font-family: inherit; font-size: .86rem;
  cursor: pointer; transition: all .15s; text-align: left;
}
.list-btn:hover { background: var(--surface2); color: var(--text); }
.list-btn.active { background: rgba(108,99,255,.1); color: var(--text); }
.list-btn .list-icon { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: .8rem; flex-shrink: 0; }
.list-btn .list-count { margin-left: auto; font-size: .7rem; color: var(--text3); }
.list-btn .list-del { opacity: 0; background: none; border: none; cursor: pointer; color: var(--text3); font-size: .85rem; padding: 0 2px; transition: color .1s; }
.list-btn:hover .list-del { opacity: 1; }
.list-btn .list-del:hover { color: var(--accent2); }

.sidebar-section { padding: 8px; border-top: 1px solid var(--border); }
.nav-btn {
  width: 100%; display: flex; align-items: center; gap: 9px;
  padding: 8px 9px; border-radius: 10px; border: none;
  background: transparent; color: var(--text2); font-family: inherit; font-size: .86rem;
  cursor: pointer; transition: all .15s; text-align: left;
}
.nav-btn:hover { background: var(--surface2); color: var(--text); }
.nav-btn.active { background: var(--surface2); color: var(--text); }
.nav-btn svg { flex-shrink: 0; }
.sync-status { padding: 9px 18px; font-size: .7rem; color: var(--text3); border-top: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent3); flex-shrink: 0; animation: pulse 2s infinite; }
.sync-dot.syncing { background: var(--accent4); }
.sync-dot.error { background: var(--accent2); animation: none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* MAIN CONTENT */
.main { margin-left: 268px; min-height: 100vh; display: flex; flex-direction: column; }
.topbar {
  padding: 18px 30px; display: flex; align-items: center; gap: 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg); position: sticky; top: 0; z-index: 50;
  transition: background .25s;
}
.topbar h2 { font-family: 'DM Serif Display', serif; font-size: 1.55rem; flex: 1; }
.topbar .member-color-bar { width: 5px; height: 26px; border-radius: 3px; flex-shrink: 0; }
.topbar-actions { display: flex; gap: 7px; align-items: center; }
.icon-btn {
  width: 34px; height: 34px; border-radius: 9px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text2); display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .15s;
}
.icon-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }

/* VIEW TABS */
.view-tabs { display: flex; gap: 4px; padding: 14px 30px 0; border-bottom: 1px solid var(--border); }
.view-tab {
  padding: 8px 16px; border-radius: 0; border: none;
  background: transparent; color: var(--text3); font-family: inherit; font-size: .84rem; font-weight: 600;
  cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; margin-bottom: -1px;
}
.view-tab.active { color: var(--text); border-bottom-color: var(--accent); }
.view-tab:hover:not(.active) { color: var(--text2); }

/* CONTENT AREA */
.content { flex: 1; padding: 22px 30px; }
.section-title { font-size: .7rem; font-weight: 700; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ADD TASK BAR */
.add-task-bar {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 11px 15px; margin-bottom: 14px;
  transition: border-color .2s;
}
.add-task-bar:focus-within { border-color: var(--accent); }
.add-task-bar input {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-family: inherit; font-size: .93rem;
}
.add-task-bar input::placeholder { color: var(--text3); }

/* TASKS */
.task-item {
  display: flex; align-items: flex-start; gap: 11px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 15px; margin-bottom: 7px;
  transition: all .15s; position: relative;
}
.task-item:hover { border-color: rgba(108,99,255,.25); background: var(--surface2); }
.task-item.completed { opacity: .5; }
.task-item.completed .task-title { text-decoration: line-through; color: var(--text3); }
.task-check {
  width: 19px; height: 19px; border-radius: 50%; border: 2px solid var(--border);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  transition: all .15s; margin-top: 2px; cursor: pointer; background: transparent;
}
.task-check:hover { border-color: var(--accent); }
.task-check.done { background: var(--accent); border-color: var(--accent); }
.task-check.done::after { content: '✓'; color: #fff; font-size: .65rem; font-weight: 700; }
.task-body { flex: 1; min-width: 0; }
.task-title { font-size: .91rem; font-weight: 500; margin-bottom: 4px; }
.task-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.task-tag { font-size: .7rem; padding: 2px 8px; border-radius: 12px; font-weight: 600; }
.task-due { font-size: .73rem; color: var(--text3); display: flex; align-items: center; gap: 3px; }
.task-due.overdue { color: var(--accent2); }
.task-due.today { color: var(--accent3); }
.prio-high { color: var(--accent2); font-size: .72rem; }
.prio-med { color: var(--accent4); font-size: .72rem; }
.prio-low { color: var(--accent3); font-size: .72rem; }
.task-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
.task-item:hover .task-actions { opacity: 1; }
.task-action-btn {
  width: 27px; height: 27px; border-radius: 7px; border: none;
  background: var(--surface3); color: var(--text3); cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all .15s;
}
.task-action-btn:hover { background: var(--accent); color: #fff; }
.task-action-btn.del:hover { background: var(--accent2); }
.assigned-tag { display: flex; align-items: center; gap: 4px; font-size: .7rem; color: var(--text3); }
.mini-av { width: 15px; height: 15px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: .5rem; font-weight: 700; overflow: hidden; }
.mini-av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.tasks-empty { text-align: center; padding: 60px 20px; color: var(--text3); }
.tasks-empty .emoji { font-size: 2.5rem; display: block; margin-bottom: 12px; }

/* FILTERS */
.filters { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px; }
.filter-chip {
  padding: 4px 13px; border-radius: 20px; border: 1px solid var(--border);
  background: transparent; color: var(--text3); font-family: inherit; font-size: .78rem; font-weight: 600;
  cursor: pointer; transition: all .15s;
}
.filter-chip:hover { border-color: var(--accent); color: var(--text); }
.filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* PROGRESS BAR */
.progress-bar { height: 4px; background: var(--surface3); border-radius: 3px; overflow: hidden; margin: 6px 0 14px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #a78bfa); border-radius: 3px; transition: width .4s ease; }

/* CALENDAR VIEW */
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border-radius: var(--radius); overflow: hidden; }
.cal-header-cell { background: var(--surface); text-align: center; padding: 9px 4px; font-size: .7rem; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; }
.cal-cell { background: var(--surface); min-height: 88px; padding: 7px; cursor: pointer; transition: background .1s; }
.cal-cell:hover { background: var(--surface2); }
.cal-cell.other-month { opacity: .35; }
.cal-cell.today .cal-day-num { background: var(--accent); color: #fff; }
.cal-day-num { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .76rem; font-weight: 600; margin-bottom: 4px; }
.cal-task-dot { font-size: .7rem; background: var(--surface3); border-radius: 4px; padding: 2px 5px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 3px; }
.cal-task-dot .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.cal-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.cal-nav h3 { font-family: 'DM Serif Display', serif; font-size: 1.25rem; flex: 1; }

/* FAMILY OVERVIEW */
.family-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(255px, 1fr)); gap: 14px; }
.family-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: all .2s; cursor: pointer; }
.family-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: rgba(108,99,255,.3); }
.family-card-header { padding: 15px; display: flex; align-items: center; gap: 11px; }
.family-card-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 700; flex-shrink: 0; overflow: hidden; }
.family-card-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.family-card-name { font-weight: 600; font-size: .97rem; }
.family-card-role { font-size: .73rem; color: var(--text3); margin-top: 2px; }
.family-card-stats { border-top: 1px solid var(--border); padding: 11px 15px; display: flex; gap: 16px; }
.stat { text-align: center; flex: 1; }
.stat-num { font-size: 1.15rem; font-weight: 700; font-family: 'DM Serif Display', serif; }
.stat-lbl { font-size: .66rem; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; }
.family-card-tasks { padding: 0 15px 13px; }
.mini-task { font-size: .76rem; color: var(--text2); padding: 3px 0; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 5px; }
.mini-task:last-child { border-bottom: none; }
.mini-task .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

/* Card progress bar */
.card-progress-wrap { padding: 10px 15px 12px; border-top: 1px solid var(--border); }
.card-progress-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.card-progress-pct { font-size: .75rem; font-weight: 700; }
.card-progress-done { font-size: .7rem; color: var(--text3); }
.card-progress-track { height: 7px; background: var(--surface3); border-radius: 99px; overflow: hidden; }
.card-progress-fill { height: 100%; border-radius: 99px; transition: width .6s cubic-bezier(.4,0,.2,1); }
.card-complete-badge {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 7px; font-size: .78rem; font-weight: 600;
  border-top: 1px solid var(--border);
  animation: badge-pop .4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes badge-pop { from { transform: scale(.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

/* Full-screen celebration overlay */
#celebration-overlay {
  position: fixed; inset: 0; pointer-events: none; z-index: 99999;
  display: flex; align-items: center; justify-content: center;
}
.celeb-message {
  background: var(--surface); border: 2px solid var(--accent);
  border-radius: 20px; padding: 20px 36px; text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,.4);
  animation: celeb-in .4s cubic-bezier(.34,1.56,.64,1) forwards;
  pointer-events: none;
}
@keyframes celeb-in { from { transform: scale(.5) translateY(40px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
.celeb-emoji { font-size: 2.8rem; display: block; margin-bottom: 6px; }
.celeb-title { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--text); }
.celeb-sub { font-size: .82rem; color: var(--text3); margin-top: 4px; }

/* Confetti canvas */
#confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 99998; }

/* LISTS VIEW */
.list-view-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
.list-view-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
.list-view-name { font-family: 'DM Serif Display', serif; font-size: 1.5rem; }
.list-view-count { font-size: .8rem; color: var(--text3); margin-top: 2px; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.65);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
  backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity .2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 30px; width: 500px; max-width: 95vw;
  max-height: 90vh; overflow-y: auto;
  transform: scale(.95) translateY(10px); transition: transform .2s, background .25s;
  box-shadow: var(--modal-shadow);
}
.modal-overlay.open .modal { transform: scale(1) translateY(0); }
.modal h3 { font-family: 'DM Serif Display', serif; font-size: 1.35rem; margin-bottom: 18px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }
.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* AVATAR PICKER in modal */
.avatar-picker { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
.avatar-preview { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 3px solid var(--border); background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; overflow: hidden; flex-shrink: 0; cursor: pointer; position: relative; }
.avatar-preview:hover::after { content: '📷'; position: absolute; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; border-radius: 50%; }
.avatar-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.avatar-upload-label { cursor: pointer; }
.avatar-upload-input { display: none; }
.avatar-emoji-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.avatar-emoji-btn { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.avatar-emoji-btn:hover { border-color: var(--accent); background: var(--surface3); }
.avatar-emoji-btn.selected { border-color: var(--accent); background: rgba(108,99,255,.15); }

/* GCAL BANNER */
.gcal-banner { background: linear-gradient(135deg, rgba(66,133,244,.12), rgba(108,99,255,.12)); border: 1px solid rgba(66,133,244,.25); border-radius: var(--radius); padding: 13px 17px; margin-bottom: 18px; display: flex; align-items: center; gap: 11px; }
.gcal-banner p { font-size: .83rem; color: var(--text2); line-height: 1.5; }
.gcal-banner a { color: #4285f4; text-decoration: none; font-weight: 600; }

/* SETTINGS */
.settings-section { margin-bottom: 28px; }
.settings-section h4 { font-weight: 600; margin-bottom: 10px; font-size: .93rem; }
.settings-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid var(--border); }
.settings-row:last-child { border-bottom: none; }
.settings-row-label { font-size: .88rem; }
.settings-row-sub { font-size: .76rem; color: var(--text3); margin-top: 2px; }
.toggle { width: 40px; height: 22px; background: var(--surface3); border-radius: 11px; position: relative; cursor: pointer; transition: background .2s; border: none; flex-shrink: 0; }
.toggle.on { background: var(--accent); }
.toggle::after { content: ''; position: absolute; width: 16px; height: 16px; background: #fff; border-radius: 50%; top: 3px; left: 3px; transition: transform .2s; }
.toggle.on::after { transform: translateX(18px); }

/* TOAST */
.toast-container { position: fixed; bottom: 22px; right: 22px; z-index: 9999; display: flex; flex-direction: column; gap: 7px; }
.toast { background: var(--surface); border: 1px solid var(--border); border-radius: 11px; padding: 11px 17px; font-size: .86rem; box-shadow: var(--shadow); display: flex; align-items: center; gap: 9px; min-width: 230px; animation: slide-in .25s ease; opacity: 1; transition: opacity .2s; }
.toast.out { opacity: 0; }
@keyframes slide-in { from { transform: translateX(40px); opacity: 0; } }
.toast.success .toast-icon { color: var(--accent3); }
.toast.error .toast-icon { color: var(--accent2); }
.toast.info .toast-icon { color: var(--accent); }

/* SCROLLBAR */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

/* MOBILE */
.sidebar-toggle { display: none; position: fixed; top: 14px; left: 14px; z-index: 200; width: 38px; height: 38px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); cursor: pointer; align-items: center; justify-content: center; color: var(--text2); }
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .sidebar-toggle { display: flex; }
  .topbar { padding: 13px 16px 13px 60px; }
  .content { padding: 14px 16px; }
  .view-tabs { padding: 10px 16px 0; }
  .family-grid { grid-template-columns: 1fr; }
  .row-2 { grid-template-columns: 1fr; }
}

@keyframes spin { to { transform: rotate(360deg); } }
@keyframes confetti-pop { to { transform: translate(var(--dx),var(--dy)); opacity: 0; } }
</style>

// ── SETUP SCREEN FUNCTIONS ──
var setupMembersList = [];
var SETUP_COLORS = ['#6c63ff','#ff6584','#43e97b','#f7971e','#38b2ac','#ed64a6','#667eea','#f6ad55','#fc8181'];

function setupShowMsg(txt, isErr) {
  var el = document.getElementById('setup-msg');
  if (!el) return;
  el.textContent = txt;
  el.style.color = isErr ? '#ff6584' : '#43e97b';
}

function setupRenderMembers() {
  var el = document.getElementById('member-list-setup');
  if (!el) return;
  if (setupMembersList.length === 0) {
    el.innerHTML = '<span style="font-size:.78rem;color:#9090a8">No members added yet</span>';
    return;
  }
  var html = '';
  for (var i = 0; i < setupMembersList.length; i++) {
    var m = setupMembersList[i];
    html += '<div style="display:inline-flex;align-items:center;gap:6px;background:' + m.color + '22;border:1px solid ' + m.color + '55;border-radius:20px;padding:5px 10px 5px 8px;font-size:.85rem;margin:3px">'
      + '<span style="width:20px;height:20px;border-radius:50%;background:' + m.color + ';display:inline-flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff">' + m.name[0].toUpperCase() + '</span>'
      + '<span style="color:var(--text)">' + m.name + '</span>'
      + '<span onclick="setupRemoveMember(' + i + ')" style="cursor:pointer;color:#9090a8;font-size:1.1rem;line-height:1;padding:0 2px">&times;</span>'
      + '</div>';
  }
  el.innerHTML = html;
}

function setupRemoveMember(i) {
  setupMembersList.splice(i, 1);
  setupRenderMembers();
}

function setupDoAdd() {
  var inp = document.getElementById('new-member-name');
  if (!inp) return;
  var name = inp.value.trim();
  if (!name) { setupShowMsg('Type a name first', true); return; }
  if (setupMembersList.length >= 9) { setupShowMsg('Maximum 9 members', true); return; }
  setupMembersList.push({
    name: name,
    color: SETUP_COLORS[setupMembersList.length % SETUP_COLORS.length],
    id: String(Date.now() + Math.random()),
    avatar: null
  });
  inp.value = '';
  inp.focus();
  setupShowMsg('');
  setupRenderMembers();
}

function setupDoLaunch() {
  setupShowMsg('Launching...');
  if (setupMembersList.length === 0) {
    setupMembersList = [
      { name: 'Dad',     color: '#6c63ff', id: String(Date.now()+1), avatar: null },
      { name: 'Mom',     color: '#ff6584', id: String(Date.now()+2), avatar: null },
      { name: 'Child 1', color: '#43e97b', id: String(Date.now()+3), avatar: null }
    ];
  }
  
  state.members = setupMembersList;
  state.lists = [
    { id: 'l1', name: 'Grocery List', emoji: '🛒', color: '#43e97b' },
    { id: 'l2', name: 'Tech Checklist', emoji: '🔧', color: '#6c63ff' },
    { id: 'l3', name: 'Home Tasks', emoji: '🏠', color: '#f7971e' }
  ];
  state.gcalKey = document.getElementById('setup-gcal-key').value.trim();
  state.gcalId = document.getElementById('setup-gcal-id').value.trim();
  
  saveConfigToFirebase();
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  startApp();
}

// ══════════════════════════════════════
// GLOBAL ERROR HANDLER
// ══════════════════════════════════════
window.onerror = function(msg, src, line, col, err) {
  var body = document.body;
  if (body && document.getElementById('app') && 
      document.getElementById('app').style.display === 'block') {
    var existing = document.getElementById('app-error-banner');
    if (!existing) {
      var banner = document.createElement('div');
      banner.id = 'app-error-banner';
      banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#ff6584;color:#fff;padding:10px 16px;font-size:.82rem;z-index:99999;display:flex;justify-content:space-between;align-items:center';
      banner.innerHTML = '<span>⚠️ Error: ' + msg + ' (line ' + line + ')</span><button onclick="this.parentElement.remove()" style="background:none;border:none;color:#fff;cursor:pointer;font-size:1.1rem">×</button>';
      document.body.prepend(banner);
    }
  }
  return false;
};

// ══════════════════════════════════════

const LIST_EMOJIS = ['📋','🛒','🏠','💼','📚','🎯','💡','🔧','✈️','🎮','🏋️','🍕','💊','🎓','🔑','🌿','🎨','🎵'];
const MEMBER_EMOJIS = ['😊','👨','👩','👦','👧','🧒','👴','👵','🧑','👶','🧔','👱','🧕','👮','👷','🧑‍🍳','🧑‍🎓','🦸'];
const LIST_COLORS = ['#6c63ff','#ff6584','#43e97b','#f7971e','#38b2ac','#ed64a6','#4285f4','#f6ad55','#a78bfa'];

let state = {
  members: [], tasks: [], lists: [],
  gcalKey: '', gcalId: '', theme: 'dark',
  currentMember: 'family', currentView: 'myday', mainView: 'tasks', currentListId: null,
  calMonth: new Date().getMonth(), calYear: new Date().getFullYear(),
  editingTaskId: null, editingMemberId: null, editingListId: null,

};

// ══════════════════════════════════════
// THEME
// ══════════════════════════════════════
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = t === 'dark' ? '🌙' : '☀️';
}
function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  applyTheme(state.theme);

function getFilteredTasks() {
  let tasks = [...state.tasks];
  const mid = state.currentMember;
  if (mid !== 'family') tasks = tasks.filter(t => String(t.member) === String(mid));
  const today = todayStr();
  switch (state.currentView) {
    case 'myday': tasks = tasks.filter(t => !t.completed && (t.dueDate === today || !t.dueDate)); break;
    case 'late': tasks = tasks.filter(t => !t.completed && t.dueDate && t.dueDate < today); break;
    case 'important': tasks = tasks.filter(t => !t.completed && t.priority === 'high'); break;
    case 'planned': tasks = tasks.filter(t => !t.completed && t.dueDate); break;
    case 'completed': tasks = tasks.filter(t => t.completed); break;
  }
  return tasks;
}

function renderTasksView() {
  const tasks = getFilteredTasks();
  const incomplete = tasks.filter(t => !t.completed);
  const complete = tasks.filter(t => t.completed);
  const today = todayStr();
  let html = '';
  
  if (state.currentView === 'myday' && state.currentMember !== 'family') {
    html += `<div style="margin-bottom:18px">
      <div style="font-family:'DM Serif Display',serif;font-size:1.45rem;margin-bottom:2px">My Day</div>
      <div style="font-size:.8rem;color:var(--text3)">${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
    </div>`;
  }
  if (state.currentView === 'late' && state.currentMember !== 'family') {
    html += `<div style="margin-bottom:18px;display:flex;align-items:center;gap:10px">
      <div>
        <div style="font-family:'DM Serif Display',serif;font-size:1.45rem;margin-bottom:2px;color:var(--accent2)">Late Tasks</div>
        <div style="font-size:.8rem;color:var(--text3)">Tasks past their due date</div>
      </div>
    </div>`;
  }
  if (state.currentMember !== 'family') {
    const total = incomplete.length + complete.length;
    const pct = total ? Math.round(complete.length / total * 100) : 0;
    html += `<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;
  }
  html += `<div class="add-task-bar">
    <svg width="15" height="15" fill="none" stroke="var(--text3)" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    <input type="text" placeholder="Add a task… press Enter" id="quick-add-input" onkeydown="if(event.key==='Enter')quickAddTask()">
    <button class="btn btn-primary btn-sm" onclick="openAddTask()">Details</button>
  </div>
  <div class="filters">
    <button class="filter-chip active" onclick="filterTasks('all',this)">All</button>
    <button class="filter-chip" onclick="filterTasks('high',this)">🔴 High</button>
    <button class="filter-chip" onclick="filterTasks('medium',this)">🟡 Medium</button>
    <button class="filter-chip" onclick="filterTasks('today',this)">📅 Today</button>
    <button class="filter-chip" onclick="filterTasks('overdue',this)">⚠️ Overdue</button>
  </div>`;
  
  if (!incomplete.length && !complete.length) {
    html += `<div class="tasks-empty"><span class="emoji">✅</span><div style="font-weight:600">Nothing here yet</div><div style="font-size:.8rem;margin-top:5px">Add a task above</div></div>`;
  }
  if (incomplete.length) html += `<div class="section-title">Active (${incomplete.length})</div>` + incomplete.map(t => renderTaskItem(t,today)).join('');
  if (complete.length) html += `<div class="section-title" style="margin-top:22px">Completed (${complete.length})</div>` + complete.map(t => renderTaskItem(t,today)).join('');
  
  document.getElementById('main-content').innerHTML = html;

  const list = state.lists.find(l => l.id === state.currentListId);

  const tasks = state.tasks.filter(t => t.listId === list.id);

  const today = todayStr();

    <div class="list-view-icon" style="background:${list.color}22;color:${list.color}">${list.emoji}</div>

  if (complete.length) html += `<div class="section-title" style="margin-top:20px">Completed</div>` + complete.map(t => renderTaskItem(t,today)).join('');

function renderTaskItem(t, today) {
  const member = state.members.find(m => String(m.id) === String(t.member));
  const color = member ? member.color : 'var(--accent)';
  const list = t.listId ? state.lists.find(l => l.id === t.listId) : null;
  const dueClass = t.dueDate ? (t.dueDate < today ? 'overdue' : t.dueDate === today ? 'today' : '') : '';
  const dueLabel = t.dueDate ? (t.dueDate < today ? '⚠ Overdue' : t.dueDate === today ? '📅 Today' : '📅 ' + formatDate(t.dueDate)) : '';
  const prioMap = { high:'🔴 High', medium:'🟡 Med', low:'🟢 Low' };
  
  return `<div class="task-item ${t.completed?'completed':''}" id="task-${t.id}">
    <button class="task-check ${t.completed?'done':''}" onclick="toggleTask('${t.id}',event)" style="${t.completed?'':'border-color:'+color}"></button>
    <div class="task-body">
      <div class="task-title">${escHtml(t.title)}</div>
      <div class="task-meta">
        ${t.dueDate ? `<span class="task-due ${dueClass}">${dueLabel}</span>` : ''}
        ${t.priority && t.priority !== 'none' ? `<span class="${t.priority==='high'?'prio-high':t.priority==='medium'?'prio-med':'prio-low'}">${prioMap[t.priority]||''}</span>` : ''}
        ${list ? `<span class="task-tag" style="background:${list.color}22;color:${list.color}">${list.emoji} ${escHtml(list.name)}</span>` : ''}
        ${state.currentMember==='family' && member ? `<span class="assigned-tag"><span class="mini-av" style="background:${color}33;color:${color}">${memberAvatarHtml(member,15)}</span>${escHtml(member.name)}</span>` : ''}
        ${t.addedToCal===true||t.addedToCal==='true' ? `<span class="task-tag" style="background:#4285f422;color:#4285f4">📅 Cal</span>` : ''}
      </div>
      ${t.dueTime ? `<span class="task-due" style="color:var(--accent4)">⏰ ${formatTime(t.dueTime)}</span>` : ''}
      ${t.recurrence ? `<span class="task-tag" style="background:rgba(108,99,255,.15);color:var(--accent)">↻ ${recurLabel(t.recurrence)}</span>` : ''}
      ${t.notes ? `<div style="font-size:.76rem;color:var(--text3);margin-top:4px">${escHtml(t.notes)}</div>` : ''}
    </div>
    <div class="task-actions">
      <button class="task-action-btn" onclick="editTask('${t.id}',event)">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
      <button class="task-action-btn del" onclick="deleteTask('${t.id}',event)">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
      </button>
    </div>
  </div>`;
}

function filterTasks(type, btn) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const today = todayStr();
  document.querySelectorAll('.task-item').forEach(el => {
    const id = el.id.replace('task-','');
    const t = state.tasks.find(x => String(x.id) === id);
    if (!t) return;
    let show = true;
    if (type==='high') show = t.priority==='high' && !t.completed;
    else if (type==='medium') show = t.priority==='medium' && !t.completed;
    else if (type==='today') show = t.dueDate===today && !t.completed;
    else if (type==='overdue') show = t.dueDate && t.dueDate < today && !t.completed;
    el.style.display = show ? '' : 'none';
  });
}

function quickAddTask() {
  const inp = document.getElementById('quick-add-input');
  const title = inp.value.trim(); if (!title) return;
  const task = makeTask(title, { member: state.currentMember==='family' ? 'family' : state.currentMember });
  pushTask(task, 'add');
  toast('Task added!','success'); inp.value = '';
}
function quickAddToList(listId) {
  const inp = document.getElementById('quick-add-input');
  const title = inp.value.trim(); if (!title) return;
  const task = makeTask(title, { member: 'family', listId });
  pushTask(task, 'add');
  toast('Added!','success'); inp.value = '';
}
function makeTask(title, overrides={}) {
  return { id:genId(), title, notes:'', member:'family', priority:'none', dueDate:'', dueTime:'', recurrence:'', listId:'', completed:false, completedAt:'', createdAt:new Date().toISOString(), addedToCal:false, ...overrides };
}
function nextRecurDate(task) {
  if (!task.dueDate || !task.recurrence) return null;
  const d = new Date(task.dueDate + 'T12:00:00');
  switch(task.recurrence) {
    case 'daily': d.setDate(d.getDate()+1); break;
    case 'weekdays':
      d.setDate(d.getDate()+1);
      while(d.getDay()===0||d.getDay()===6) d.setDate(d.getDate()+1);
      break;
    case 'weekly': d.setDate(d.getDate()+7); break;
    case 'biweekly': d.setDate(d.getDate()+14); break;
    case 'monthly': d.setMonth(d.getMonth()+1); break;
    case 'yearly': d.setFullYear(d.getFullYear()+1); break;
    default: return null;
  }
  return d.toISOString().split('T')[0];
}
function spawnRecurringTask(completedTask) {
  if (!completedTask.recurrence) return;
  const next = nextRecurDate(completedTask);
  if (!next) return;
  const newTask = makeTask(completedTask.title, {
    notes: completedTask.notes, member: completedTask.member, priority: completedTask.priority,
    dueDate: next, dueTime: completedTask.dueTime, recurrence: completedTask.recurrence,
    listId: completedTask.listId, addedToCal: completedTask.addedToCal
  });
  pushTask(newTask, 'add');
  toast('Recurring task scheduled for ' + formatDate(next), 'info');
}

  document.getElementById('task-modal-title').textContent = 'Add Task';
  document.getElementById('t-title').value = '';
  document.getElementById('t-notes').value = '';
  document.getElementById('t-due').value = '';

  document.getElementById('t-add-to-cal').checked = false;

}

function openAddTaskToList(listId) {
  openAddTask();

}

function editTask(id, e) {
  if (e) e.stopPropagation();
  const t = state.tasks.find(x => String(x.id)===String(id)); if (!t) return;
  state.editingTaskId = id;
  document.getElementById('task-modal-title').textContent = 'Edit Task';
  document.getElementById('t-title').value = t.title;
  document.getElementById('t-notes').value = t.notes || '';
  document.getElementById('t-due').value = t.dueDate || '';
  document.getElementById('t-priority').value = t.priority || 'none';
  document.getElementById('t-add-to-cal').checked = t.addedToCal===true||t.addedToCal==='true';
  document.getElementById('t-member').value = t.member;
  document.getElementById('t-list-sel').value = t.listId || '';
  document.getElementById('t-time').value = t.dueTime || '';
  document.getElementById('t-recur').value = t.recurrence || '';
  document.getElementById('task-modal').classList.add('open');
}

function saveTask() {
  const title = document.getElementById('t-title').value.trim();
  if (!title) { toast('Please enter a task title','error'); return; }
  const addToCal = document.getElementById('t-add-to-cal').checked;
  const dueDate = document.getElementById('t-due').value;
  
  if (state.editingTaskId) {
    const idx = state.tasks.findIndex(x => String(x.id)===String(state.editingTaskId));
    if (idx > -1) {
      const updatedTask = Object.assign({}, state.tasks[idx], { 
        title, 
        notes: document.getElementById('t-notes').value, 
        member: document.getElementById('t-member').value, 
        priority: document.getElementById('t-priority').value, 
        dueDate, 
        dueTime: document.getElementById('t-time').value, 
        recurrence: document.getElementById('t-recur').value, 
        listId: document.getElementById('t-list-sel').value, 
        addedToCal: addToCal 
      });
      pushTask(updatedTask, 'update'); 
      toast('Updated!','success');
    }
  } else {
    const task = makeTask(title, { 
      notes: document.getElementById('t-notes').value, 
      member: document.getElementById('t-member').value, 
      priority: document.getElementById('t-priority').value, 
      dueDate, 
      dueTime: document.getElementById('t-time').value, 
      recurrence: document.getElementById('t-recur').value, 
      listId: document.getElementById('t-list-sel').value, 
      addedToCal: addToCal 
    });
    pushTask(task, 'add'); 
    toast('Task added!','success');
    if (addToCal && dueDate) addToGoogleCalendar(task);
  }
  closeModal('task-modal');
}

function toggleTask(id, e) {
  if (e) e.stopPropagation();
  const t = state.tasks.find(x => String(x.id)===String(id)); if (!t) return;
  
  const updatedTask = Object.assign({}, t, {
    completed: !t.completed,
    completedAt: !t.completed ? new Date().toISOString() : ''
  });
  
  pushTask(updatedTask, 'update');
  if (updatedTask.completed) { confettiTask(id); if(updatedTask.recurrence) spawnRecurringTask(updatedTask); }
}

function deleteTask(id, e) {
  if (e) e.stopPropagation();
  if (!confirm('Delete this task?')) return;
  pushTask({id: id}, 'delete');
  toast('Deleted','info');
}

function launchConfetti() {
  const old = document.getElementById('confetti-canvas');
  if (old) old.remove();

  const canvas = document.createElement('canvas');
  canvas.id = 'confetti-canvas';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  const COLORS = ['#6c63ff','#ff6584','#43e97b','#f7971e','#38b2ac','#a78bfa','#fbbf24','#34d399','#f87171'];
  const SHAPES = ['circle','rect','triangle'];
  const count = 120;
  const pieces = Array.from({length: count}, () => ({
    x: Math.random() * canvas.width,
    y: -20 - Math.random() * 200,
    r: 4 + Math.random() * 7,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    shape: SHAPES[Math.floor(Math.random() * SHAPES.length)],
    vx: (Math.random() - 0.5) * 5,
    vy: 3 + Math.random() * 5,
    spin: (Math.random() - 0.5) * 0.3,
    angle: Math.random() * Math.PI * 2,
    opacity: 1,
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: 0.05 + Math.random() * 0.05,
  }));

  let frame = 0;
  const maxFrames = 160;

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.y += p.vy; p.x += p.vx; p.angle += p.spin; p.wobble += p.wobbleSpeed; p.x += Math.sin(p.wobble) * 1.5; p.vy += 0.12;
      if (frame > maxFrames * 0.6) p.opacity = Math.max(0, p.opacity - 0.025);
      ctx.save(); ctx.globalAlpha = p.opacity; ctx.fillStyle = p.color; ctx.translate(p.x, p.y); ctx.rotate(p.angle);
      if (p.shape === 'circle') { ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI * 2); ctx.fill(); } 
      else if (p.shape === 'rect') { ctx.fillRect(-p.r, -p.r / 2, p.r * 2, p.r); } 
      else { ctx.beginPath(); ctx.moveTo(0, -p.r); ctx.lineTo(p.r, p.r); ctx.lineTo(-p.r, p.r); ctx.closePath(); ctx.fill(); }
      ctx.restore();
    });
    frame++;
    if (frame < maxFrames) requestAnimationFrame(draw); else canvas.remove();
  }
  requestAnimationFrame(draw);
}

function renderCalendar() {
  document.getElementById('view-tabs').style.display = 'none';
  const { calMonth: month, calYear: year } = state;
  const monthName = new Date(year,month,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const todayStr2 = todayStr();
  const firstDay = new Date(year,month,1).getDay();
  const daysInMonth = new Date(year,month+1,0).getDate();
  const daysInPrev = new Date(year,month,0).getDate();
  let html = `
  <div class="gcal-banner">
    <svg width="20" height="20" viewBox="0 0 24 24"><rect width="24" height="24" rx="3" fill="#4285f4"/><rect x="3" y="11" width="18" height="10" rx="1" fill="white" opacity=".15"/><text x="12" y="19" font-size="8" fill="white" text-anchor="middle" font-family="sans-serif" font-weight="bold">CAL</text></svg>
    <p>${state.gcalKey ? '✅ Google Calendar linked.' : '🔗 <a href="#" onclick="setView(\'settings\')">Link Google Calendar in Settings →</a>'}</p>
  </div>
  <div class="cal-nav">
    <button class="icon-btn" onclick="calPrev()">‹</button>
    <h3>${monthName}</h3>
    <button class="icon-btn" onclick="calNext()">›</button>
    <button class="btn btn-ghost btn-sm" onclick="calToday()">Today</button>
  </div>
  <div class="cal-grid">
    ${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-header-cell">${d}</div>`).join('')}`;
  const totalCells = Math.ceil((firstDay+daysInMonth)/7)*7;
  for (let i=0;i<totalCells;i++) {
    let day, isOther=false, ds;
    if (i<firstDay) { day=daysInPrev-firstDay+i+1; isOther=true; ds=`${year}-${pad(month)}-${pad(day)}`; }
    else if (i>=firstDay+daysInMonth) { day=i-firstDay-daysInMonth+1; isOther=true; ds=`${year}-${pad(month+2)}-${pad(day)}`; }
    else { day=i-firstDay+1; ds=`${year}-${pad(month+1)}-${pad(day)}`; }
    const isToday=ds===todayStr2;
    const dayTasks = state.tasks.filter(t=>t.dueDate===ds&&!t.completed);
    const m = state.currentMember!=='family' ? state.members.find(m=>String(m.id)===String(state.currentMember)) : null;
    const ft = m ? dayTasks.filter(t=>String(t.member)===String(m.id)) : dayTasks;
    html += `<div class="cal-cell ${isOther?'other-month':''} ${isToday?'today':''}" onclick="calDayClick('${ds}')">
      <div class="cal-day-num">${day}</div>
      ${ft.slice(0,3).map(t=>{
        const tm=state.members.find(m=>String(m.id)===String(t.member));
        const c=tm?tm.color:'var(--accent)';
        return `<div class="cal-task-dot"><span class="dot" style="background:${c}"></span>${escHtml(t.title.substring(0,16))}${t.title.length>16?'…':''}</div>`;
      }).join('')}
      ${ft.length>3?`<div style="font-size:.66rem;color:var(--text3)">+${ft.length-3} more</div>`:''}
    </div>`;
  }
  html += '</div>';
  document.getElementById('main-content').innerHTML = html;
}

function calNext() { state.calMonth++; if(state.calMonth>11){state.calMonth=0;state.calYear++;} renderCalendar(); }

// ══════════════════════════════════════
// FIREBASE REAL-TIME SYNC LOGIC
// ══════════════════════════════════════
async function pushTask(task, action) {
  const db = getDb(); if (!db) return;
  try {
    if (action === 'delete') {
      await db.ref('tasks/' + task.id).remove();
    } else {
      await db.ref('tasks/' + task.id).set(task);
    }
  } catch(e) {
    console.error('pushTask error:', e);
    toast('Failed to save to Firebase', 'error');
  }
}

function saveConfigToFirebase() {
  const db = getDb(); if (!db) return;
  var payload = {
    members: state.members.map(function(m) {
      return {
        id: m.id, name: m.name, color: m.color,
        avatar: (m.avatar && m.avatar.startsWith('data:')) ? null : m.avatar
      };
    }),
    lists: state.lists,
    gcalKey: state.gcalKey,
    gcalId: state.gcalId,
    theme: state.theme
  };
  db.ref('config').set(payload).catch(function(e) { console.error('Config sync error:', e); });
}

function startFirebaseListener() {
  if (_fbListening) return;
  const db = getDb(); if (!db) return;
  _fbListening = true;
  setSyncStatus('syncing');

  // Real-time listener for tasks
  db.ref('tasks').on('value', function(snap) {
    const data = snap.val();
    if (data) {
      const remoteTasks = Object.values(data).map(function(t) {
        return Object.assign({}, t, {
          completed: t.completed === true || t.completed === 'true',
          addedToCal: t.addedToCal === true || t.addedToCal === 'true'
        });
      });
      // Sort tasks newer first
      state.tasks = remoteTasks.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
    } else {
      state.tasks = [];
    }
    updateCounts();
    renderView();
    renderSidebarLists();
    state.lastSync = new Date();
    setSyncStatus('ok');
  }, function(err) {
    console.error('Firebase tasks error:', err);
    setSyncStatus('error');
  });

  // Real-time listener for config (members, lists)
  db.ref('config').on('value', function(snap) {
    const data = snap.val();
    if (data) {
      var changed = false;
      if (data.members && JSON.stringify(data.members) !== JSON.stringify(state.members)) {
        state.members = data.members; changed = true;
      }
      if (data.lists && JSON.stringify(data.lists) !== JSON.stringify(state.lists)) {
        state.lists = data.lists; changed = true;
      }
      if (data.gcalKey !== undefined) state.gcalKey = data.gcalKey;
      if (data.gcalId !== undefined) state.gcalId = data.gcalId;
      
      if (changed) {
        renderSidebar();
        renderSidebarLists();
        renderView();
      }
    } else {
        // If Firebase config is completely empty (first time run), write the local state up to it
        saveConfigToFirebase();
    }
  });
}

function setSyncStatus(s) {
  const dot=document.getElementById('sync-dot'), txt=document.getElementById('sync-text');
  if (!dot) return;
  dot.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');
  txt.textContent=s==='syncing'?'Syncing…':s==='error'?'Sync error':state.lastSync?'Synced '+timeAgo(state.lastSync):'Connected';
}

function renderView() {

function todayStr() { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
function formatTime(t) { if(!t) return ''; try { const [h,m]=t.split(':'); const hr=parseInt(h); return `${hr%12||12}:${m} ${hr<12?'AM':'PM'}`; } catch(e){return t;} }
function recurLabel(r) { const map={daily:'Daily',weekdays:'Weekdays',weekly:'Weekly',biweekly:'Every 2 wks',monthly:'Monthly',yearly:'Yearly'}; return map[r]||r; }
function pad(n) { return String(n).padStart(2,'0'); }
function genId() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatDate(d) { if(!d) return ''; const [y,m,day]=d.split('-'); return new Date(y,m-1,day).toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function timeAgo(d) { const diff=Math.round((new Date()-d)/1000); if(diff<60) return 'just now'; if(diff<3600) return Math.round(diff/60)+'m ago'; return Math.round(diff/3600)+'h ago'; }
function toast(msg,type='info') {
  const c=document.getElementById('toasts'), el=document.createElement('div');
  el.className=`toast ${type}`;
  el.innerHTML=`<span class="toast-icon">${{success:'✅',error:'❌',info:'ℹ️'}[type]||'ℹ️'}</span><span>${msg}</span>`;
  c.appendChild(el);
  setTimeout(()=>{el.classList.add('out');setTimeout(()=>el.remove(),250);},3500);
}

function _boot() {
  document.querySelectorAll('.modal-overlay').forEach(function(o) {
    o.addEventListener('click', function(e) {
      if (e.target === o) o.classList.remove('open');
    });
  });

  // Since we are using Firebase, we check if Firebase has populated data yet.
  // We'll show the setup screen ONLY if local storage is completely empty, 
  // otherwise we jump right to the app and let Firebase hydrate the data.
  const saved = localStorage.getItem('familyhub_v2');
  if (!saved) {
    document.getElementById('setup-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  } else {
    // We have some local cache, skip setup and let Firebase take over
    try {
        const c = JSON.parse(saved);
        if (c.theme) state.theme = c.theme;
        if (c.members) state.members = c.members;
        if (c.lists) state.lists = c.lists;
    } catch(e) {}
    startApp();
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', _boot);
} else {
  setTimeout(_boot, 0);
}
</script>
</body>
</html>
