<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boyle Family Hub — To-Do</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="shortcut icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<style>
[data-theme="dark"] {
  --bg: #0a1628;
  --surface: #0f2040;
  --surface2: #162d55;
  --surface3: #1e3a6e;
  --border: rgba(100,160,255,0.12);
  --text: #e8f4ff;
  --text2: #7db3e8;
  --text3: #4a7ab5;
  --shadow: 0 8px 32px rgba(0,0,0,0.5);
  --setup-bg: radial-gradient(ellipse at 60% 40%, #0d2d5e 0%, #0a1628 70%);
  --modal-shadow: 0 24px 80px rgba(0,0,0,.7);
  --scrollbar-thumb: #1e3a6e;
}
[data-theme="light"] {
  --bg: #daeeff;
  --surface: #ffffff;
  --surface2: #eaf5ff;
  --surface3: #d0eaff;
  --border: rgba(0,100,200,0.12);
  --text: #0a2a4a;
  --text2: #2a6096;
  --text3: #5a90c0;
  --shadow: 0 8px 32px rgba(0,80,160,0.12);
  --setup-bg: radial-gradient(ellipse at 60% 40%, #b8deff 0%, #daeeff 70%);
  --modal-shadow: 0 24px 80px rgba(0,80,160,.18);
  --scrollbar-thumb: #a0c8f0;
}
:root {
  --accent: #1a7fe8;
  --accent2: #e84a6f;
  --accent3: #18c97a;
  --accent4: #f0960a;
  --accent5: #5ab4ff;
  --radius: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; transition: background .25s, color .25s; }
#setup-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--setup-bg); }
.setup-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 48px; width: 540px; max-width: 95vw; box-shadow: var(--shadow); }
.setup-card h1 { font-family: 'DM Serif Display', serif; font-size: 2.2rem; margin-bottom: 8px; background: linear-gradient(135deg, #5ab4ff, #1a7fe8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.setup-card p { color: var(--text2); margin-bottom: 28px; font-size: .95rem; line-height: 1.6; }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: .82rem; font-weight: 600; color: var(--text2); margin-bottom: 6px; letter-spacing: .05em; text-transform: uppercase; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 11px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: inherit; font-size: .95rem; outline: none; transition: border-color .2s, background .25s; }
.form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
.form-group select { cursor: pointer; }
.btn { padding: 11px 22px; border-radius: 10px; border: none; font-family: inherit; font-weight: 600; font-size: .9rem; cursor: pointer; transition: all .15s; }
.btn-primary { background: linear-gradient(135deg, #1a7fe8, #1260c0); color: #fff; box-shadow: 0 3px 12px rgba(26,127,232,.35); }
.btn-primary:hover { background: linear-gradient(135deg, #2a8ff8, #1a70d0); transform: translateY(-1px); }
.btn-sm { padding: 8px 14px; font-size: .82rem; border-radius: 8px; }
.btn-ghost { background: var(--surface3); color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); background: var(--surface2); border-color: var(--accent5); }
.divider { height: 1px; background: var(--border); margin: 24px 0; }
.step-label { font-size: .75rem; font-weight: 700; color: var(--accent5); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 16px; }
#app { display: none; min-height: 100vh; }

/* SIDEBAR */
.sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 268px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; transition: transform .25s ease, background .25s; }
.sidebar-header { padding: 18px 18px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.sidebar-header .app-name { font-family: 'DM Serif Display', serif; font-size: 1.25rem; background: linear-gradient(135deg, #5ab4ff, #1a7fe8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; flex: 1; }
.sidebar-header .app-sub { font-size: .72rem; color: var(--text3); margin-top: 1px; }
.theme-toggle-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: .9rem; transition: all .15s; flex-shrink: 0; }
.theme-toggle-btn:hover { background: var(--surface3); border-color: var(--accent); }
.family-list { padding: 10px 8px; flex: 1; overflow-y: auto; }
.family-list-label { font-size: .68rem; font-weight: 700; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; padding: 6px 8px 8px; }
.member-btn { width: 100%; display: flex; align-items: center; gap: 9px; padding: 8px 9px; border-radius: 10px; border: none; background: transparent; color: var(--text2); font-family: inherit; font-size: .88rem; cursor: pointer; transition: all .15s; text-align: left; }
.member-btn:hover { background: var(--surface2); color: var(--text); }
.member-btn.active { background: rgba(26,127,232,.15); color: var(--text); border-left: 3px solid var(--accent); padding-left: 6px; }
.member-btn .m-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 700; flex-shrink: 0; overflow: hidden; }
.member-btn .m-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.member-btn .m-count { margin-left: auto; background: var(--surface3); color: var(--text3); font-size: .7rem; font-weight: 600; padding: 2px 7px; border-radius: 20px; }
.member-btn.active .m-count { background: var(--accent); color: #fff; }
.lists-section { padding: 6px 8px; border-top: 1px solid var(--border); }
.lists-section-header { display: flex; align-items: center; justify-content: space-between; padding: 6px 8px 8px; }
.lists-section-label { font-size: .68rem; font-weight: 700; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; }
.add-list-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 1.1rem; line-height: 1; padding: 0 2px; transition: color .15s; }
.add-list-btn:hover { color: var(--accent); }
.list-btn { width: 100%; display: flex; align-items: center; gap: 9px; padding: 7px 9px; border-radius: 10px; border: none; background: transparent; color: var(--text2); font-family: inherit; font-size: .86rem; cursor: pointer; transition: all .15s; text-align: left; }
.list-btn:hover { background: var(--surface2); color: var(--text); }
.list-btn.active { background: rgba(26,127,232,.1); color: var(--text); }
.list-btn .list-icon { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: .8rem; flex-shrink: 0; }
.list-btn .list-count { margin-left: auto; font-size: .7rem; color: var(--text3); }
.list-btn .list-del { opacity: 0; background: none; border: none; cursor: pointer; color: var(--text3); font-size: .85rem; padding: 0 2px; transition: color .1s; }
.list-btn:hover .list-del { opacity: 1; }
.list-btn .list-del:hover { color: var(--accent2); }
.sidebar-section { padding: 8px; border-top: 1px solid var(--border); }
.nav-btn { width: 100%; display: flex; align-items: center; gap: 9px; padding: 8px 9px; border-radius: 10px; border: none; background: transparent; color: var(--text2); font-family: inherit; font-size: .86rem; cursor: pointer; transition: all .15s; text-align: left; }
.nav-btn:hover { background: var(--surface2); color: var(--text); }
.nav-btn.active { background: rgba(26,127,232,.12); color: var(--text); border-left: 3px solid var(--accent); padding-left: 6px; }
.nav-btn svg { flex-shrink: 0; }
.sync-status { padding: 9px 18px; font-size: .7rem; color: var(--text3); border-top: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent3); flex-shrink: 0; animation: pulse 2s infinite; }
.sync-dot.syncing { background: var(--accent4); }
.sync-dot.error { background: var(--accent2); animation: none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* SIDEBAR OVERLAY for mobile */
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 99; }
.sidebar-overlay.visible { display: block; }

/* MAIN */
.main { margin-left: 268px; min-height: 100vh; display: flex; flex-direction: column; }
.topbar { padding: 18px 30px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 50; transition: background .25s; box-shadow: 0 2px 12px rgba(0,60,140,.10); }
.topbar h2 { font-family: 'DM Serif Display', serif; font-size: 1.55rem; flex: 1; }
.topbar .member-color-bar { width: 5px; height: 26px; border-radius: 3px; flex-shrink: 0; }
.topbar-actions { display: flex; gap: 7px; align-items: center; }
.icon-btn { width: 34px; height: 34px; border-radius: 9px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; }
.icon-btn:hover { background: var(--surface3); color: var(--text); border-color: var(--accent); }
.view-tabs { display: flex; gap: 4px; padding: 14px 30px 0; border-bottom: 1px solid var(--border); background: var(--surface); overflow-x: auto; }
.view-tab { padding: 8px 16px; border-radius: 0; border: none; background: transparent; color: var(--text3); font-family: inherit; font-size: .84rem; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; margin-bottom: -1px; white-space: nowrap; }
.view-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.view-tab:hover:not(.active) { color: var(--text2); }
.content { flex: 1; padding: 22px 30px; }
.section-title { font-size: .7rem; font-weight: 700; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.add-task-bar { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 15px; margin-bottom: 14px; transition: border-color .2s; box-shadow: 0 2px 8px rgba(0,60,140,.06); }
.add-task-bar:focus-within { border-color: var(--accent); }
.add-task-bar input { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: inherit; font-size: .93rem; }
.add-task-bar input::placeholder { color: var(--text3); }
.task-item { display: flex; align-items: flex-start; gap: 11px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 15px; margin-bottom: 7px; transition: all .15s; position: relative; box-shadow: 0 1px 4px rgba(0,60,140,.06); }
.task-item:hover { border-color: rgba(26,127,232,.35); background: var(--surface2); }
.task-item.completed { opacity: .5; }
.task-item.completed .task-title { text-decoration: line-through; color: var(--text3); }
.task-check { width: 19px; height: 19px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .15s; margin-top: 2px; cursor: pointer; background: transparent; }
.task-check:hover { border-color: var(--accent); background: rgba(26,127,232,.1); }
.task-check.done { background: var(--accent); border-color: var(--accent); }
.task-check.done::after { content: '✓'; color: #fff; font-size: .65rem; font-weight: 700; }
.task-body { flex: 1; min-width: 0; }
.task-title { font-size: .91rem; font-weight: 500; margin-bottom: 4px; }
.task-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.task-tag { font-size: .7rem; padding: 2px 8px; border-radius: 12px; font-weight: 600; }
.task-due { font-size: .73rem; color: var(--text3); display: flex; align-items: center; gap: 3px; }
.task-due.overdue { color: var(--accent2); }
.task-due.today { color: var(--accent3); }
.prio-high { color: var(--accent2); font-size: .72rem; font-weight: 600; }
.prio-med { color: var(--accent4); font-size: .72rem; font-weight: 600; }
.prio-low { color: var(--accent3); font-size: .72rem; font-weight: 600; }
.task-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
.task-item:hover .task-actions { opacity: 1; }
.task-action-btn { width: 27px; height: 27px; border-radius: 7px; border: none; background: var(--surface3); color: var(--text3); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.task-action-btn:hover { background: var(--accent); color: #fff; }
.task-action-btn.del:hover { background: var(--accent2); }
.assigned-tag { display: flex; align-items: center; gap: 4px; font-size: .7rem; color: var(--text3); }
.mini-av { width: 15px; height: 15px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: .5rem; font-weight: 700; overflow: hidden; }
.mini-av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.tasks-empty { text-align: center; padding: 60px 20px; color: var(--text3); }
.tasks-empty .emoji { font-size: 2.5rem; display: block; margin-bottom: 12px; }
.filters { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 14px; }
.filter-chip { padding: 4px 13px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text3); font-family: inherit; font-size: .78rem; font-weight: 600; cursor: pointer; transition: all .15s; }
.filter-chip:hover { border-color: var(--accent); color: var(--text); background: rgba(26,127,232,.08); }
.filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.progress-bar { height: 5px; background: var(--surface3); border-radius: 3px; overflow: hidden; margin: 6px 0 14px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent5)); border-radius: 3px; transition: width .4s ease; }

/* KANBAN */
.kanban-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; align-items: start; }
.kanban-col { background: var(--surface2); border-radius: 14px; border: 1px solid var(--border); overflow: hidden; }
.kanban-col-header { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.kanban-col-title { font-weight: 700; font-size: .85rem; display: flex; align-items: center; gap: 8px; }
.kanban-col-badge { font-size: .7rem; font-weight: 700; padding: 2px 8px; border-radius: 12px; }
.kanban-cards { padding: 10px; min-height: 80px; display: flex; flex-direction: column; gap: 8px; }
.kanban-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; cursor: pointer; transition: all .15s; position: relative; box-shadow: 0 1px 4px rgba(0,60,140,.06); }
.kanban-card:hover { border-color: rgba(26,127,232,.4); box-shadow: 0 4px 14px rgba(26,127,232,.12); transform: translateY(-1px); }
.kanban-card-title { font-size: .86rem; font-weight: 500; margin-bottom: 6px; }
.kanban-card-meta { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
.kanban-card-actions { display: flex; gap: 4px; opacity: 0; position: absolute; top: 8px; right: 8px; transition: opacity .15s; }
.kanban-card:hover .kanban-card-actions { opacity: 1; }
.kanban-drag-hint { text-align: center; padding: 20px; color: var(--text3); font-size: .78rem; }
@media (max-width: 768px) { .kanban-board { grid-template-columns: 1fr; } }

/* CALENDAR */
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border-radius: var(--radius); overflow: hidden; }
.cal-header-cell { background: var(--surface2); text-align: center; padding: 9px 4px; font-size: .7rem; font-weight: 700; color: var(--accent5); text-transform: uppercase; letter-spacing: .05em; }
.cal-cell { background: var(--surface); min-height: 88px; padding: 7px; cursor: pointer; transition: background .1s; }
.cal-cell:hover { background: var(--surface2); }
.cal-cell.other-month { opacity: .35; }
.cal-cell.today .cal-day-num { background: var(--accent); color: #fff; }
.cal-day-num { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .76rem; font-weight: 600; margin-bottom: 4px; }
.cal-task-dot { font-size: .7rem; background: rgba(26,127,232,.12); border-radius: 4px; padding: 2px 5px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 3px; color: var(--text2); }
.cal-task-dot .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.cal-task-dot.gcal-event { background: rgba(15,157,88,.12); color: #0f9d58; }
.cal-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.cal-nav h3 { font-family: 'DM Serif Display', serif; font-size: 1.25rem; flex: 1; }

/* FAMILY OVERVIEW */
.family-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(255px, 1fr)); gap: 14px; }
.family-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: all .2s; cursor: pointer; box-shadow: 0 2px 8px rgba(0,60,140,.07); }
.family-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(26,127,232,.15); border-color: rgba(26,127,232,.35); }
.family-card-header { padding: 15px; display: flex; align-items: center; gap: 11px; }
.family-card-avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 700; flex-shrink: 0; overflow: hidden; }
.family-card-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.family-card-name { font-weight: 600; font-size: .97rem; }
.family-card-role { font-size: .73rem; color: var(--text3); margin-top: 2px; }
.family-card-stats { border-top: 1px solid var(--border); padding: 11px 15px; display: flex; gap: 16px; background: var(--surface2); }
.stat { text-align: center; flex: 1; }
.stat-num { font-size: 1.15rem; font-weight: 700; font-family: 'DM Serif Display', serif; color: var(--accent5); }
.stat-lbl { font-size: .66rem; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; }
.card-progress-wrap { padding: 10px 15px 12px; border-top: 1px solid var(--border); }
.card-progress-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.card-progress-pct { font-size: .75rem; font-weight: 700; }
.card-progress-done { font-size: .7rem; color: var(--text3); }
.card-progress-track { height: 7px; background: var(--surface3); border-radius: 99px; overflow: hidden; }
.card-progress-fill { height: 100%; border-radius: 99px; transition: width .6s cubic-bezier(.4,0,.2,1); }
.card-complete-badge { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 7px; font-size: .78rem; font-weight: 600; border-top: 1px solid var(--border); background: rgba(24,201,122,.07); }

/* CELEBRATION */
#celebration-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 99999; display: flex; align-items: center; justify-content: center; }
.celeb-message { background: var(--surface); border: 2px solid var(--accent); border-radius: 20px; padding: 20px 36px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.4); animation: celeb-in .4s cubic-bezier(.34,1.56,.64,1) forwards; pointer-events: none; }
@keyframes celeb-in { from{transform:scale(.5) translateY(40px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }
.celeb-emoji { font-size: 2.8rem; display: block; margin-bottom: 6px; }
.celeb-title { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--text); }
.celeb-sub { font-size: .82rem; color: var(--text3); margin-top: 4px; }
#confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 99998; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,20,60,.70); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity .2s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 30px; width: 500px; max-width: 95vw; max-height: 90vh; overflow-y: auto; transform: scale(.95) translateY(10px); transition: transform .2s, background .25s; box-shadow: var(--modal-shadow); }
.modal-overlay.open .modal { transform: scale(1) translateY(0); }
.modal h3 { font-family: 'DM Serif Display', serif; font-size: 1.35rem; margin-bottom: 18px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }
.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.avatar-picker { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
.avatar-preview { width: 60px; height: 60px; border-radius: 50%; border: 3px solid var(--border); background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; overflow: hidden; flex-shrink: 0; cursor: pointer; position: relative; }
.avatar-preview:hover::after { content: '📷'; position: absolute; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; border-radius: 50%; }
.avatar-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.avatar-upload-input { display: none; }
.avatar-emoji-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.avatar-emoji-btn { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.avatar-emoji-btn:hover { border-color: var(--accent); }
.avatar-emoji-btn.selected { border-color: var(--accent); background: rgba(26,127,232,.18); }

/* SETTINGS */
.settings-section { margin-bottom: 28px; }
.settings-section h4 { font-weight: 700; margin-bottom: 10px; font-size: .93rem; color: var(--accent5); }
.settings-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid var(--border); }
.settings-row:last-child { border-bottom: none; }
.settings-row-label { font-size: .88rem; }
.settings-row-sub { font-size: .76rem; color: var(--text3); margin-top: 2px; }
.toggle { width: 40px; height: 22px; background: var(--surface3); border-radius: 11px; position: relative; cursor: pointer; transition: background .2s; border: none; flex-shrink: 0; }
.toggle.on { background: var(--accent); }
.toggle::after { content: ''; position: absolute; width: 16px; height: 16px; background: #fff; border-radius: 50%; top: 3px; left: 3px; transition: transform .2s; }
.toggle.on::after { transform: translateX(18px); }

/* TOAST */
.toast-container { position: fixed; bottom: 22px; right: 22px; z-index: 9999; display: flex; flex-direction: column; gap: 7px; }
.toast { background: var(--surface); border: 1px solid var(--border); border-radius: 11px; padding: 11px 17px; font-size: .86rem; box-shadow: var(--shadow); display: flex; align-items: center; gap: 9px; min-width: 230px; animation: slide-in .25s ease; opacity: 1; transition: opacity .2s; }
.toast.out { opacity: 0; }
@keyframes slide-in { from{transform:translateX(40px);opacity:0} }
.toast.success .toast-icon { color: var(--accent3); }
.toast.error .toast-icon { color: var(--accent2); }
.toast.info .toast-icon { color: var(--accent5); }

/* DAILY OFFICE */
.office-btn-row { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 28px; }
.office-btn { padding: 12px 24px; border-radius: 12px; border: 2px solid var(--border); background: var(--surface2); color: var(--text2); font-family: 'DM Sans', inherit; font-size: .9rem; font-weight: 600; cursor: pointer; transition: all .2s; }
.office-btn:hover { border-color: var(--accent); color: var(--text); background: rgba(26,127,232,.08); }
.office-btn.active { background: linear-gradient(135deg, #1a7fe8, #1260c0); border-color: #1a7fe8; color: #fff; box-shadow: 0 4px 14px rgba(26,127,232,.35); }
.office-content { max-width: 680px; margin: 0 auto; text-align: center; }
.office-content h2 { font-family: 'DM Serif Display', serif; font-size: 1.8rem; margin-bottom: 6px; }
.office-content .office-subtitle { font-size: .85rem; color: var(--text3); margin-bottom: 28px; letter-spacing: .05em; text-transform: uppercase; }
.office-section { margin-bottom: 26px; text-align: center; }
.office-section h3 { font-family: 'DM Serif Display', serif; font-size: 1.15rem; color: var(--accent5); margin-bottom: 10px; }
.office-section p { font-size: .92rem; line-height: 1.85; color: var(--text2); margin-bottom: 8px; }
.office-section .rubric { font-size: .8rem; color: var(--text3); font-style: italic; margin-bottom: 10px; }
.office-section .versicle { font-size: .92rem; line-height: 2; }
.office-section .versicle .v-label { color: var(--accent5); font-weight: 700; margin-right: 8px; font-size: .82rem; }
.office-psalm { background: var(--surface2); border-radius: 12px; padding: 18px 22px; margin: 10px 0; text-align: left; }
.office-psalm p { font-size: .88rem; line-height: 1.9; color: var(--text2); }
.office-divider { height: 1px; background: var(--border); margin: 22px auto; max-width: 200px; }
.gcal-banner { background: linear-gradient(135deg,rgba(26,127,232,.10),rgba(90,180,255,.10)); border: 1px solid rgba(26,127,232,.25); border-radius: var(--radius); padding: 13px 17px; margin-bottom: 18px; display: flex; align-items: center; gap: 11px; }
.gcal-banner p { font-size: .83rem; color: var(--text2); line-height: 1.5; }
.gcal-banner a { color: var(--accent5); text-decoration: none; font-weight: 600; }

/* IMPORT */
.import-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 28px; text-align: center; cursor: pointer; transition: all .2s; background: var(--surface2); }
.import-zone:hover, .import-zone.dragover { border-color: var(--accent); background: rgba(26,127,232,.07); }
.import-zone .import-icon { font-size: 2rem; display: block; margin-bottom: 8px; }
.import-zone p { font-size: .85rem; color: var(--text2); margin-bottom: 4px; }
.import-zone small { font-size: .75rem; color: var(--text3); }
.import-preview { margin-top: 14px; max-height: 220px; overflow-y: auto; border: 1px solid var(--border); border-radius: 10px; }
.import-preview table { width: 100%; border-collapse: collapse; font-size: .78rem; }
.import-preview th { background: var(--surface3); padding: 7px 10px; text-align: left; font-weight: 700; color: var(--accent5); border-bottom: 1px solid var(--border); position: sticky; top: 0; }
.import-preview td { padding: 6px 10px; border-bottom: 1px solid var(--border); color: var(--text2); }
.import-col-map .map-row { display: grid; grid-template-columns: 1fr 20px 1fr; gap: 8px; align-items: center; margin-bottom: 8px; font-size: .82rem; }
.import-col-map .map-arrow { text-align: center; color: var(--accent5); }
.import-col-map select { padding: 7px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: .82rem; outline: none; }
.sheets-banner { background: linear-gradient(135deg,rgba(15,157,88,.10),rgba(26,127,232,.10)); border: 1px solid rgba(15,157,88,.25); border-radius: 10px; padding: 12px 15px; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; font-size: .82rem; color: var(--text2); }
.sheets-banner a { color: #0f9d58; font-weight: 600; text-decoration: none; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }
.sidebar-toggle { display: none; position: fixed; top: 14px; left: 14px; z-index: 200; width: 38px; height: 38px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); cursor: pointer; align-items: center; justify-content: center; color: var(--text2); }
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }

  .main { margin-left: 0; }

  .view-tabs { padding: 10px 16px 0; }
  .family-grid { grid-template-columns: 1fr; }
  .row-2 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<script>

var setupMembersList=[];
var SETUP_COLORS=['#1a7fe8','#e84a6f','#18c97a','#f0960a','#38b2ac','#8b5cf6','#5ab4ff','#f6ad55','#fc8181'];
function setupShowMsg(t,e){var el=document.getElementById('setup-msg');if(el){el.textContent=t;el.style.color=e?'#e84a6f':'#18c97a';}}
function setupRenderMembers(){var el=document.getElementById('member-list-setup');if(!el)return;if(!setupMembersList.length){el.innerHTML='<span style="font-size:.78rem;color:var(--text3)">No members added yet</span>';return;}el.innerHTML=setupMembersList.map((m,i)=>`<div style="display:inline-flex;align-items:center;gap:6px;background:${m.color}22;border:1px solid ${m.color}55;border-radius:20px;padding:5px 10px 5px 8px;font-size:.85rem;margin:3px"><span style="width:20px;height:20px;border-radius:50%;background:${m.color};display:inline-flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff">${m.name[0].toUpperCase()}</span><span style="color:var(--text)">${m.name}</span><span onclick="setupRemoveMember(${i})" style="cursor:pointer;color:var(--text3);font-size:1.1rem;line-height:1">&times;</span></div>`).join('');}

function setupDoAdd(){var inp=document.getElementById('new-member-name');if(!inp)return;var n=inp.value.trim();if(!n){setupShowMsg('Type a name first',true);return;}if(setupMembersList.length>=9){setupShowMsg('Max 9 members',true);return;}setupMembersList.push({name:n,color:SETUP_COLORS[setupMembersList.length%SETUP_COLORS.length],id:String(Date.now()+Math.random()),avatar:null});inp.value='';inp.focus();setupShowMsg('');setupRenderMembers();}
function setupDoLaunch(){
  setupShowMsg('Launching...');
  if(!setupMembersList.length)setupMembersList=[{name:'Dad',color:'#1a7fe8',id:String(Date.now()+1),avatar:null},{name:'Mom',color:'#e84a6f',id:String(Date.now()+2),avatar:null},{name:'Child 1',color:'#18c97a',id:String(Date.now()+3),avatar:null}];
  state.members=setupMembersList;

  state.gcalKey=document.getElementById('setup-gcal-key').value.trim();
  state.gcalId=document.getElementById('setup-gcal-id').value.trim();

function applyTheme(t){document.documentElement.setAttribute('data-theme',t);const b=document.getElementById('theme-btn');if(b)b.textContent=t==='dark'?'🌙':'☀️';}
function toggleTheme(){state.theme=state.theme==='dark'?'light':'dark';applyTheme(state.theme);saveConfigToFirebase();}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function todayStr(){const d=new Date();return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function pad(n){return String(n).padStart(2,'0');}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function formatDate(d){if(!d)return'';const[y,m,day]=d.split('-');return new Date(y,m-1,day).toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function formatTime(t){if(!t)return'';try{const[h,m]=t.split(':');const hr=parseInt(h);return`${hr%12||12}:${m} ${hr<12?'AM':'PM'}`;}catch(e){return t;}}
function recurLabel(r){return{daily:'Daily',weekdays:'Weekdays',weekly:'Weekly',biweekly:'Every 2 wks',monthly:'Monthly',yearly:'Yearly'}[r]||r;}
function timeAgo(d){const diff=Math.round((new Date()-d)/1000);if(diff<60)return'just now';if(diff<3600)return Math.round(diff/60)+'m ago';return Math.round(diff/3600)+'h ago';}
function toast(msg,type='info'){const c=document.getElementById('toasts'),el=document.createElement('div');el.className=`toast ${type}`;el.innerHTML=`<span class="toast-icon">${{success:'✅',error:'❌',info:'ℹ️'}[type]||'ℹ️'}</span><span>${msg}</span>`;c.appendChild(el);setTimeout(()=>{el.classList.add('out');setTimeout(()=>el.remove(),250);},3500);}

// GOOGLE CALENDAR — FETCH EVENTS
// ══════════════════════════════════════
async function fetchGoogleCalendarEvents(){
  if(!state.gcalKey||!state.gcalId)return;
  try{
    const now=new Date();
    const start=new Date(now.getFullYear(),now.getMonth()-1,1).toISOString();
    const end=new Date(now.getFullYear(),now.getMonth()+3,1).toISOString();
    const url=`https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(state.gcalId)}/events?key=${state.gcalKey}&timeMin=${start}&timeMax=${end}&singleEvents=true&orderBy=startTime&maxResults=250`;
    const resp=await fetch(url);
    if(!resp.ok)throw new Error('GCal HTTP '+resp.status);
    const data=await resp.json();
    state.gcalEvents=(data.items||[]).map(ev=>({
      id:ev.id,
      title:ev.summary||'(No title)',
      date:ev.start?.date||(ev.start?.dateTime?ev.start.dateTime.split('T')[0]:''),
      time:ev.start?.dateTime?ev.start.dateTime.split('T')[1]?.substring(0,5):'',
      color:'#0f9d58'
    }));
    if(state.mainView==='calendar')renderCalendar();
    toast(`Loaded ${state.gcalEvents.length} calendar events`,'info');
  }catch(e){
    console.error('GCal fetch error:',e);
    toast('Could not load Google Calendar events','error');
  }
}
function addToGoogleCalendar(task){if(!state.gcalKey||!state.gcalId)return;console.log('GCal push stub:',task.title,task.dueDate);}

// TASKS VIEW
// ══════════════════════════════════════
function getFilteredTasks(){
  let tasks=[...state.tasks];const mid=state.currentMember;
  if(mid!=='family')tasks=tasks.filter(t=>String(t.member)===String(mid));
  const today=todayStr();
  switch(state.currentView){
    case'myday':tasks=tasks.filter(t=>!t.completed&&(t.dueDate===today||!t.dueDate));break;
    case'late':tasks=tasks.filter(t=>!t.completed&&t.dueDate&&t.dueDate<today);break;
    case'important':tasks=tasks.filter(t=>!t.completed&&t.priority==='high');break;
    case'planned':tasks=tasks.filter(t=>!t.completed&&t.dueDate);break;
    case'completed':tasks=tasks.filter(t=>t.completed);break;
  }
  return tasks;
}
function renderTasksView(){
  const tasks=getFilteredTasks();const incomplete=tasks.filter(t=>!t.completed);const complete=tasks.filter(t=>t.completed);const today=todayStr();let html='';
  if(state.currentView==='myday'&&state.currentMember!=='family')html+=`<div style="margin-bottom:18px"><div style="font-family:'DM Serif Display',serif;font-size:1.45rem">My Day</div><div style="font-size:.8rem;color:var(--text3)">${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div></div>`;
  if(state.currentView==='late'&&state.currentMember!=='family')html+=`<div style="margin-bottom:18px"><div style="font-family:'DM Serif Display',serif;font-size:1.45rem;color:var(--accent2)">Late Tasks</div><div style="font-size:.8rem;color:var(--text3)">Tasks past their due date</div></div>`;
  if(state.currentMember!=='family'){const total=incomplete.length+complete.length;const pct=total?Math.round(complete.length/total*100):0;html+=`<div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;}
  html+=`<div class="add-task-bar"><svg width="15" height="15" fill="none" stroke="var(--text3)" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg><input type="text" placeholder="Add a task… press Enter" id="quick-add-input" onkeydown="if(event.key==='Enter')quickAddTask()"><button class="btn btn-primary btn-sm" onclick="openAddTask()">Details</button></div>
  <div class="filters"><button class="filter-chip active" onclick="filterTasks('all',this)">All</button><button class="filter-chip" onclick="filterTasks('high',this)">🔴 High</button><button class="filter-chip" onclick="filterTasks('medium',this)">🟡 Medium</button><button class="filter-chip" onclick="filterTasks('today',this)">📅 Today</button><button class="filter-chip" onclick="filterTasks('overdue',this)">⚠️ Overdue</button></div>`;
  if(!incomplete.length&&!complete.length)html+=`<div class="tasks-empty"><span class="emoji">✅</span><div style="font-weight:600">Nothing here yet</div><div style="font-size:.8rem;margin-top:5px">Add a task above</div></div>`;
  if(incomplete.length)html+=`<div class="section-title">Active (${incomplete.length})</div>`+incomplete.map(t=>renderTaskItem(t,today)).join('');
  if(complete.length)html+=`<div class="section-title" style="margin-top:22px">Completed (${complete.length})</div>`+complete.map(t=>renderTaskItem(t,today)).join('');
  document.getElementById('main-content').innerHTML=html;
}
function renderTaskItem(t,today){
  const member=state.members.find(m=>String(m.id)===String(t.member));const color=member?member.color:'var(--accent)';
  const list=t.listId?state.lists.find(l=>l.id===t.listId):null;
  const dueClass=t.dueDate?(t.dueDate<today?'overdue':t.dueDate===today?'today':''):'';
  const dueLabel=t.dueDate?(t.dueDate<today?'⚠ Overdue':t.dueDate===today?'📅 Today':'📅 '+formatDate(t.dueDate)):'';
  const prioMap={high:'🔴 High',medium:'🟡 Med',low:'🟢 Low'};
  const statusMap={notstarted:'⬜ Not Started',inprogress:'🔵 In Progress',complete:'✅ Complete'};
  return`<div class="task-item ${t.completed?'completed':''}" id="task-${t.id}">
    <button class="task-check ${t.completed?'done':''}" onclick="toggleTask('${t.id}',event)" style="${t.completed?'':'border-color:'+color}"></button>
    <div class="task-body">
      <div class="task-title">${escHtml(t.title)}</div>
      <div class="task-meta">
        ${t.dueDate?`<span class="task-due ${dueClass}">${dueLabel}</span>`:''}
        ${t.priority&&t.priority!=='none'?`<span class="${t.priority==='high'?'prio-high':t.priority==='medium'?'prio-med':'prio-low'}">${prioMap[t.priority]||''}</span>`:''}
        ${list?`<span class="task-tag" style="background:${list.color}22;color:${list.color}">${list.emoji} ${escHtml(list.name)}</span>`:''}
        ${state.currentMember==='family'&&member?`<span class="assigned-tag"><span class="mini-av" style="background:${color}33;color:${color}">${memberAvatarHtml(member,15)}</span>${escHtml(member.name)}</span>`:''}
        ${t.status&&t.status!=='notstarted'?`<span class="task-tag" style="background:rgba(26,127,232,.12);color:var(--accent5);font-size:.68rem">${statusMap[t.status]||''}</span>`:''}
      </div>
      ${t.dueTime?`<div><span class="task-due" style="color:var(--accent4)">⏰ ${formatTime(t.dueTime)}</span></div>`:''}
      ${t.recurrence?`<div><span class="task-tag" style="background:rgba(26,127,232,.15);color:var(--accent5)">↻ ${recurLabel(t.recurrence)}</span></div>`:''}
      ${t.notes?`<div style="font-size:.76rem;color:var(--text3);margin-top:4px">${escHtml(t.notes)}</div>`:''}
    </div>
    <div class="task-actions">
      <button class="task-action-btn" onclick="editTask('${t.id}',event)"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
      <button class="task-action-btn del" onclick="deleteTask('${t.id}',event)"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg></button>
    </div>
  </div>`;
}
function filterTasks(type,btn){
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));if(btn)btn.classList.add('active');
  const today=todayStr();
  document.querySelectorAll('.task-item').forEach(el=>{const id=el.id.replace('task-','');const t=state.tasks.find(x=>String(x.id)===id);if(!t)return;let show=true;if(type==='high')show=t.priority==='high'&&!t.completed;else if(type==='medium')show=t.priority==='medium'&&!t.completed;else if(type==='today')show=t.dueDate===today&&!t.completed;else if(type==='overdue')show=t.dueDate&&t.dueDate<today&&!t.completed;el.style.display=show?'':'none';});
}

function renderKanban(listId){
  const list=state.lists.find(l=>l.id===listId);if(!list){renderTasksView();return;}
  const tasks=state.tasks.filter(t=>t.listId===listId);
  const cols=[
    {key:'notstarted',label:'Not Started',color:'#5ab4ff',bg:'rgba(90,180,255,.12)',icon:'⬜'},
    {key:'inprogress',label:'In Progress',color:'#f0960a',bg:'rgba(240,150,10,.12)',icon:'🔵'},
    {key:'complete',label:'Complete',color:'#18c97a',bg:'rgba(24,201,122,.12)',icon:'✅'}
  ];
  const today=todayStr();
  document.getElementById('topbar-title').textContent=list.name;
  document.getElementById('topbar-color').style.background=list.color;
  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px">

      <span style="font-size:1.6rem">${list.emoji}</span>
      <div><div style="font-family:'DM Serif Display',serif;font-size:1.4rem">${escHtml(list.name)}</div><div style="font-size:.78rem;color:var(--text3)">${tasks.length} total · Kanban view</div></div>
    </div>
    <button class="btn btn-primary btn-sm" onclick="openAddTaskToList('${listId}')">+ Add Card</button>
  </div>
  <div class="kanban-board">`;
  cols.forEach(col=>{
    const colTasks=tasks.filter(t=>{
      if(col.key==='complete')return t.completed||(t.status==='complete');
      if(col.key==='inprogress')return !t.completed&&t.status==='inprogress';
      return !t.completed&&(!t.status||t.status==='notstarted');
    });
    html+=`<div class="kanban-col">
      <div class="kanban-col-header">
        <div class="kanban-col-title"><span>${col.icon}</span><span style="color:${col.color}">${col.label}</span></div>
        <span class="kanban-col-badge" style="background:${col.bg};color:${col.color}">${colTasks.length}</span>
      </div>
      <div class="kanban-cards">`;
    if(!colTasks.length)html+=`<div class="kanban-drag-hint">No tasks here</div>`;
    colTasks.forEach(t=>{
      const member=state.members.find(m=>String(m.id)===String(t.member));const color=member?member.color:'var(--accent)';
      const overdue=!t.completed&&t.dueDate&&t.dueDate<today;
      html+=`<div class="kanban-card" onclick="editTask('${t.id}',event)">
        <div class="kanban-card-actions">
          <button class="task-action-btn del" onclick="deleteTask('${t.id}',event)"><svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg></button>
        </div>
        <div class="kanban-card-title">${escHtml(t.title)}</div>
        <div class="kanban-card-meta">
          ${t.priority&&t.priority!=='none'?`<span style="font-size:.68rem;padding:1px 6px;border-radius:8px;background:${t.priority==='high'?'rgba(232,74,111,.15)':t.priority==='medium'?'rgba(240,150,10,.15)':'rgba(24,201,122,.15)'};color:${t.priority==='high'?'var(--accent2)':t.priority==='medium'?'var(--accent4)':'var(--accent3)'}">${{high:'🔴 High',medium:'🟡 Med',low:'🟢 Low'}[t.priority]}</span>`:''}
          ${t.dueDate?`<span style="font-size:.68rem;color:${overdue?'var(--accent2)':'var(--text3)'}">${overdue?'⚠':''} ${formatDate(t.dueDate)}</span>`:''}

function makeTask(title,overrides={}){return{id:genId(),title,notes:'',member:'family',priority:'none',dueDate:'',dueTime:'',recurrence:'',listId:'',completed:false,completedAt:'',createdAt:new Date().toISOString(),addedToCal:false,status:'notstarted',...overrides};}
function nextRecurDate(task){if(!task.dueDate||!task.recurrence)return null;const d=new Date(task.dueDate+'T12:00:00');switch(task.recurrence){case'daily':d.setDate(d.getDate()+1);break;case'weekdays':d.setDate(d.getDate()+1);while(d.getDay()===0||d.getDay()===6)d.setDate(d.getDate()+1);break;case'weekly':d.setDate(d.getDate()+7);break;case'biweekly':d.setDate(d.getDate()+14);break;case'monthly':d.setMonth(d.getMonth()+1);break;case'yearly':d.setFullYear(d.getFullYear()+1);break;default:return null;}return d.toISOString().split('T')[0];}
function spawnRecurringTask(ct){if(!ct.recurrence)return;const next=nextRecurDate(ct);if(!next)return;pushTask(makeTask(ct.title,{notes:ct.notes,member:ct.member,priority:ct.priority,dueDate:next,dueTime:ct.dueTime,recurrence:ct.recurrence,listId:ct.listId,addedToCal:ct.addedToCal}),'add');toast('Recurring task for '+formatDate(next),'info');}

const CELEB_MESSAGES=[{emoji:'🎉',title:'Task crushed!',sub:'One down, greatness continues.'},{emoji:'⭐',title:'Nailed it!',sub:'The Boyle family gets things done.'},{emoji:'🏆',title:'Winner!',sub:'Another one bites the dust.'},{emoji:'🚀',title:'Blasted off!',sub:'To the moon and back.'}];

function launchConfetti(){const old=document.getElementById('confetti-canvas');if(old)old.remove();const canvas=document.createElement('canvas');canvas.id='confetti-canvas';canvas.width=window.innerWidth;canvas.height=window.innerHeight;document.body.appendChild(canvas);const ctx=canvas.getContext('2d');const COLS=['#1a7fe8','#e84a6f','#18c97a','#f0960a','#38b2ac','#8b5cf6','#5ab4ff','#fbbf24','#34d399'];const SHAPES=['circle','rect','triangle'];const pieces=Array.from({length:120},()=>({x:Math.random()*canvas.width,y:-20-Math.random()*200,r:4+Math.random()*7,color:COLS[Math.floor(Math.random()*COLS.length)],shape:SHAPES[Math.floor(Math.random()*SHAPES.length)],vx:(Math.random()-.5)*5,vy:3+Math.random()*5,spin:(Math.random()-.5)*.3,angle:Math.random()*Math.PI*2,opacity:1,wobble:Math.random()*Math.PI*2,wobbleSpeed:.05+Math.random()*.05}));let frame=0;const maxFrames=160;function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);pieces.forEach(p=>{p.y+=p.vy;p.x+=p.vx;p.angle+=p.spin;p.wobble+=p.wobbleSpeed;p.x+=Math.sin(p.wobble)*1.5;p.vy+=.12;if(frame>maxFrames*.6)p.opacity=Math.max(0,p.opacity-.025);ctx.save();ctx.globalAlpha=p.opacity;ctx.fillStyle=p.color;ctx.translate(p.x,p.y);ctx.rotate(p.angle);if(p.shape==='circle'){ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();}else if(p.shape==='rect'){ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);}else{ctx.beginPath();ctx.moveTo(0,-p.r);ctx.lineTo(p.r,p.r);ctx.lineTo(-p.r,p.r);ctx.closePath();ctx.fill();}ctx.restore();});frame++;if(frame<maxFrames)requestAnimationFrame(draw);else canvas.remove();}requestAnimationFrame(draw);}
function showCelebMessage(){const old=document.getElementById('celebration-overlay');if(old)old.remove();const msg=CELEB_MESSAGES[Math.floor(Math.random()*CELEB_MESSAGES.length)];const overlay=document.createElement('div');overlay.id='celebration-overlay';overlay.innerHTML='<div class="celeb-message"><span class="celeb-emoji">'+msg.emoji+'</span><div class="celeb-title">'+msg.title+'</div><div class="celeb-sub">'+msg.sub+'</div></div>';document.body.appendChild(overlay);setTimeout(()=>{const el=overlay.querySelector('.celeb-message');if(el){el.style.transition='opacity .4s,transform .4s';el.style.opacity='0';el.style.transform='scale(.8) translateY(-20px)';}setTimeout(()=>overlay.remove(),420);},2200);}

function renderCalendar(){
  document.getElementById('view-tabs').style.display='none';
  const{calMonth:month,calYear:year}=state;
  const monthName=new Date(year,month,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const todayStr2=todayStr();const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();const daysInPrev=new Date(year,month,0).getDate();
  const syncBtn=state.gcalKey?`<button class="btn btn-ghost btn-sm" onclick="fetchGoogleCalendarEvents()">🔄 Sync GCal</button>`:'';
  let html=`<div class="gcal-banner"><svg width="20" height="20" viewBox="0 0 24 24"><rect width="24" height="24" rx="3" fill="#1a7fe8"/><rect x="3" y="11" width="18" height="10" rx="1" fill="white" opacity=".2"/><text x="12" y="19" font-size="8" fill="white" text-anchor="middle" font-family="sans-serif" font-weight="bold">CAL</text></svg><p>${state.gcalKey?`✅ Google Calendar linked — ${state.gcalEvents.length} events loaded. ${syncBtn}`:'🔗 <a href="#" onclick="navTo(\'settings\')">Link Google Calendar in Settings →</a>'}</p></div>
  <div class="cal-nav"><button class="icon-btn" onclick="calPrev()">‹</button><h3>${monthName}</h3><button class="icon-btn" onclick="calNext()">›</button><button class="btn btn-ghost btn-sm" onclick="calToday()">Today</button></div>
  <div class="cal-grid">${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=>`<div class="cal-header-cell">${d}</div>`).join('')}`;
  const totalCells=Math.ceil((firstDay+daysInMonth)/7)*7;
  for(let i=0;i<totalCells;i++){
    let day,isOther=false,ds;
    if(i<firstDay){day=daysInPrev-firstDay+i+1;isOther=true;const pm=month===0?12:month;const py=month===0?year-1:year;ds=`${py}-${pad(pm)}-${pad(day)}`;}
    else if(i>=firstDay+daysInMonth){day=i-firstDay-daysInMonth+1;isOther=true;const nm=month===11?1:month+2;const ny=month===11?year+1:year;ds=`${ny}-${pad(nm)}-${pad(day)}`;}
    else{day=i-firstDay+1;ds=`${year}-${pad(month+1)}-${pad(day)}`;}
    const isToday=ds===todayStr2;
    const dayTasks=state.tasks.filter(t=>t.dueDate===ds&&!t.completed);
    const m2=state.currentMember!=='family'?state.members.find(m=>String(m.id)===String(state.currentMember)):null;
    const ft=m2?dayTasks.filter(t=>String(t.member)===String(m2.id)):dayTasks;
    const gcalEvs=state.gcalEvents.filter(e=>e.date===ds);
    html+=`<div class="cal-cell ${isOther?'other-month':''} ${isToday?'today':''}" onclick="calDayClick('${ds}')">
      <div class="cal-day-num">${day}</div>
      ${gcalEvs.slice(0,2).map(e=>`<div class="cal-task-dot gcal-event"><span class="dot" style="background:#0f9d58"></span>${escHtml(e.title.substring(0,14))}${e.title.length>14?'…':''}</div>`).join('')}
      ${ft.slice(0,3-Math.min(gcalEvs.length,2)).map(t=>{const tm=state.members.find(m=>String(m.id)===String(t.member));const c=tm?tm.color:'var(--accent)';return`<div class="cal-task-dot"><span class="dot" style="background:${c}"></span>${escHtml(t.title.substring(0,14))}${t.title.length>14?'…':''}</div>`;}).join('')}
      ${(ft.length+gcalEvs.length)>3?`<div style="font-size:.66rem;color:var(--text3)">+${ft.length+gcalEvs.length-3} more</div>`:''}
    </div>`;
  }
  html+='</div>';document.getElementById('main-content').innerHTML=html;
}
function calPrev(){state.calMonth--;if(state.calMonth<0){state.calMonth=11;state.calYear--;}renderCalendar();}
function calNext(){state.calMonth++;if(state.calMonth>11){state.calMonth=0;state.calYear++;}renderCalendar();}
function calToday(){state.calMonth=new Date().getMonth();state.calYear=new Date().getFullYear();renderCalendar();}

function importDrop(e){e.preventDefault();document.getElementById('import-dropzone').classList.remove('dragover');const f=e.dataTransfer.files[0];if(f)importReadFile(f);}
function importHandleFile(e){const f=e.target.files[0];if(f)importReadFile(f);}
function importReadFile(file){if(!file.name.toLowerCase().endsWith('.csv')&&file.type!=='text/csv'){toast('Please upload a .csv file','error');return;}const r=new FileReader();r.onload=e=>importParseCSV(e.target.result);r.readAsText(file);}
function importParsePastedCSV(){const t=document.getElementById('csv-paste-area').value.trim();if(!t){toast('Paste some CSV first','error');return;}importParseCSV(t);}
function importParseCSV(text){
  const lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(l=>l.trim());if(lines.length<1){toast('CSV is empty','error');return;}
  function parseCSVLine(line){const result=[];let cur='';let inQ=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}else if(ch===','&&!inQ){result.push(cur.trim());cur='';}else cur+=ch;}result.push(cur.trim());return result;}
  importHeaders=parseCSVLine(lines[0]);importParsedRows=lines.slice(1).map(l=>parseCSVLine(l));importShowMapping();
}
async function importFetchSheets(){
  const url=document.getElementById('sheets-url-input').value.trim();if(!url){toast('Paste a Sheets URL','error');return;}
  const st=document.getElementById('sheets-status');st.textContent='Fetching…';st.style.color='var(--accent5)';
  const match=url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);if(!match){toast('Could not find spreadsheet ID','error');st.textContent='';return;}
  const sheetId=match[1];
  try{const resp=await fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&id=${sheetId}`);if(!resp.ok)throw new Error('HTTP '+resp.status);const text=await resp.text();st.textContent='✅ Sheet fetched!';st.style.color='var(--accent3)';importParseCSV(text);}
  catch(e){st.innerHTML='❌ Could not fetch. Make sure it is shared publicly.';st.style.color='var(--accent2)';toast('Failed to fetch Google Sheet','error');}
}
function importShowMapping(){
  if(!importHeaders.length){toast('No headers found','error');return;}
  document.getElementById('import-mapping-section').style.display='';
  const fieldMap={title:['title','task','name','todo','item','subject','summary'],notes:['notes','note','detail','description','body','comment'],dueDate:['due','duedate','due date','date','deadline','end date'],priority:['priority','prio','importance','urgent'],member:['assigned','assignee','member','person','owner','who'],listId:['list','category','group','project','bucket']};
  const FIELDS=['title','notes','dueDate','priority','member','listId'];
  const LABELS={title:'Task Title *',notes:'Notes',dueDate:'Due Date',priority:'Priority',member:'Assigned To',listId:'List'};
  function autoDetect(f){const kw=fieldMap[f]||[];for(let i=0;i<importHeaders.length;i++){const h=importHeaders[i].toLowerCase().trim();if(kw.some(k=>h===k||h.includes(k)))return String(i);}return'';}
  const hOpts='<option value="">— Skip —</option>'+importHeaders.map((h,i)=>`<option value="${i}">${escHtml(h)}</option>`).join('');
  document.getElementById('col-map-grid').innerHTML=FIELDS.map(f=>`<div class="map-row"><div style="font-size:.83rem;font-weight:600;color:var(--text2)">${LABELS[f]}</div><div class="map-arrow">→</div><select id="map-${f}">${hOpts}</select></div>`).join('');
  FIELDS.forEach(f=>{const sel=document.getElementById('map-'+f);if(sel){const v=autoDetect(f);if(v!=='')sel.value=v;}});
  document.getElementById('import-preview-table').innerHTML=`<table><thead><tr>${importHeaders.map(h=>`<th>${escHtml(h)}</th>`).join('')}</tr></thead><tbody>${importParsedRows.slice(0,5).map(row=>`<tr>${importHeaders.map((_,i)=>`<td>${escHtml(row[i]||'')}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
}
async function importExecute(){
  const tc=document.getElementById('map-title')?.value;if(tc===''){toast('Map the Title column first','error');return;}
  const getCol=f=>document.getElementById('map-'+f)?.value;
  const dm=document.getElementById('imp-default-member')?.value||'family';
  const dp=document.getElementById('imp-default-priority')?.value||'none';
  const dl=document.getElementById('imp-default-list')?.value||'';
  const nc=getCol('notes')!==''?parseInt(getCol('notes')):-1;const dc=getCol('dueDate')!==''?parseInt(getCol('dueDate')):-1;
  const pc=getCol('priority')!==''?parseInt(getCol('priority')):-1;const mc=getCol('member')!==''?parseInt(getCol('member')):-1;const lc=getCol('listId')!==''?parseInt(getCol('listId')):-1;
  function normP(v){if(!v)return dp;const s=v.toLowerCase().trim();if(s==='high'||s==='h'||s==='urgent')return'high';if(s==='medium'||s==='med'||s==='m'||s==='normal')return'medium';if(s==='low'||s==='l')return'low';return dp;}
  function normD(v){if(!v||!v.trim())return'';if(/^\d{4}-\d{2}-\d{2}$/.test(v.trim()))return v.trim();const d=new Date(v);return isNaN(d.getTime())?'':d.toISOString().split('T')[0];}
  function resolveM(v){if(!v||!v.trim())return dm;const f=state.members.find(m=>m.name.toLowerCase()===v.trim().toLowerCase());return f?f.id:dm;}
  function resolveL(v){if(!v||!v.trim())return dl;const f=state.lists.find(l=>l.name.toLowerCase()===v.trim().toLowerCase());return f?f.id:dl;}
  let imported=0,skipped=0;const tci=parseInt(tc);
  for(const row of importParsedRows){const title=(row[tci]||'').trim();if(!title){skipped++;continue;}await pushTask(makeTask(title,{notes:nc>=0?(row[nc]||'').trim():'',dueDate:dc>=0?normD(row[dc]):'',priority:pc>=0?normP(row[pc]):dp,member:mc>=0?resolveM(row[mc]):dm,listId:lc>=0?resolveL(row[lc]):dl}),'add');imported++;}
  toast(`✅ Imported ${imported} task${imported!==1?'s':''}${skipped?` (${skipped} skipped)`:''}!`,'success');
  importParsedRows=[];importHeaders=[];
  setTimeout(()=>{state.mainView='tasks';state.currentMember='family';selectMember('family',document.querySelector('[data-member="family"]'));},800);
}

async function pushTask(task,action){
  const db=getDb();if(!db)return;
  try{if(action==='delete')await db.ref('tasks/'+task.id).remove();else await db.ref('tasks/'+task.id).set(task);}
  catch(e){console.error('pushTask error:',e);toast('Failed to save','error');}
}
function saveConfigToFirebase(){
  const db=getDb();if(!db)return;
  db.ref('config').set({members:state.members.map(m=>({id:m.id,name:m.name,color:m.color,avatar:m.avatar||null})),lists:state.lists,gcalKey:state.gcalKey,gcalId:state.gcalId,theme:state.theme}).catch(e=>console.error('Config sync:',e));
}
function startFirebaseListener(){
  if(_fbListening)return;const db=getDb();if(!db)return;_fbListening=true;setSyncStatus('syncing');
  db.ref('tasks').on('value',snap=>{
    const data=snap.val();
    state.tasks=data?Object.values(data).map(t=>Object.assign({},t,{completed:t.completed===true||t.completed==='true',addedToCal:t.addedToCal===true||t.addedToCal==='true'})).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)):[];
    updateCounts();renderView();renderSidebarLists();state.lastSync=new Date();setSyncStatus('ok');
  },err=>{console.error(err);setSyncStatus('error');});
  db.ref('config').on('value',snap=>{
    const data=snap.val();
    if(data){
      let changed=false;
      if(data.members&&JSON.stringify(data.members)!==JSON.stringify(state.members)){state.members=data.members;changed=true;}
      if(data.lists&&JSON.stringify(data.lists)!==JSON.stringify(state.lists)){state.lists=data.lists;changed=true;}
      if(data.gcalKey!==undefined)state.gcalKey=data.gcalKey;if(data.gcalId!==undefined)state.gcalId=data.gcalId;
      if(data.theme&&data.theme!==state.theme){state.theme=data.theme;applyTheme(state.theme);}
      localStorage.setItem('familyhub_v2',JSON.stringify({theme:state.theme,members:state.members,lists:state.lists,gcalKey:state.gcalKey,gcalId:state.gcalId}));
      if(changed){renderSidebar();renderSidebarLists();renderView();}
    }else saveConfigToFirebase();
  });
}
function setSyncStatus(s){const dot=document.getElementById('sync-dot'),txt=document.getElementById('sync-text');if(!dot)return;dot.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');txt.textContent=s==='syncing'?'Syncing…':s==='error'?'Sync error':state.lastSync?'Synced '+timeAgo(state.lastSync):'Connected';}

        ${m?`<span style="font-size:.7rem;background:${m.color}22;color:${m.color};padding:1px 7px;border-radius:10px">${escHtml(m.name)}</span>`:''}
        ${lst?`<span style="font-size:.7rem;background:${lst.color}22;color:${lst.color};padding:1px 7px;border-radius:10px">${lst.emoji} ${escHtml(lst.name)}</span>`:''}
        ${t.dueDate?`<span style="font-size:.7rem;color:${ov?'var(--accent2)':'var(--text3)'}">${ov?'⚠':'📅'} ${formatDate(t.dueDate)}</span>`:''}
      </span>
    </span>
  </label>`;}).join('');
  massUpdateSelectedCount();
}
function massUpdateSelectedCount(){const cbs=document.querySelectorAll('.mu-task-cb:checked');const el=document.getElementById('mu-selected-count');if(el)el.textContent=cbs.length+' task'+(cbs.length!==1?'s':'')+' selected';}
function massSelectAll(){document.querySelectorAll('.mu-task-cb').forEach(cb=>cb.checked=true);massUpdateSelectedCount();}
function massSelectNone(){document.querySelectorAll('.mu-task-cb').forEach(cb=>cb.checked=false);massUpdateSelectedCount();}
function massUpdateToggleActionFields(){
  const type=document.getElementById('mu-action-type')?.value;const wrap=document.getElementById('mu-action-value-wrap');if(!wrap)return;
  const mo=state.members.map(m=>`<option value="${m.id}">${escHtml(m.name)}</option>`).join('');
  const lo='<option value="">No list</option>'+state.lists.map(l=>`<option value="${l.id}">${l.emoji} ${escHtml(l.name)}</option>`).join('');
  const fields={reassign:`<label>Assign To</label><select id="mu-action-val"><option value="family">All Family</option>${mo}</select>`,priority:`<label>Priority</label><select id="mu-action-val"><option value="none">None</option><option value="low">🟢 Low</option><option value="medium">🟡 Medium</option><option value="high">🔴 High</option></select>`,due:`<label>Due Date</label><input type="date" id="mu-action-val">`,list:`<label>List</label><select id="mu-action-val">${lo}</select>`,status:`<label>Status</label><select id="mu-action-val"><option value="notstarted">⬜ Not Started</option><option value="inprogress">🔵 In Progress</option><option value="complete">✅ Complete</option></select>`,complete:'',incomplete:'',delete:''};
  if(type&&fields[type]!==undefined)wrap.innerHTML=fields[type]?`<div class="form-group" style="margin:0">${fields[type]}</div>`:`<div style="display:flex;align-items:flex-end;padding-bottom:4px"><span style="font-size:.8rem;color:var(--text3)">No extra value needed</span></div>`;else wrap.innerHTML='';
}
async function massUpdateApply(){
  const type=document.getElementById('mu-action-type')?.value;if(!type){toast('Choose an action','error');return;}
  const ids=[...document.querySelectorAll('.mu-task-cb:checked')].map(cb=>cb.dataset.id);if(!ids.length){toast('No tasks selected','error');return;}
  if(type==='delete'&&!confirm(`Delete ${ids.length} task${ids.length!==1?'s':''}?`))return;
  const av=document.getElementById('mu-action-val')?.value??'';let n=0;
  for(const id of ids){const t=state.tasks.find(x=>String(x.id)===String(id));if(!t)continue;if(type==='delete'){await pushTask({id},'delete');}else{const u=Object.assign({},t);if(type==='reassign')u.member=av;if(type==='priority')u.priority=av;if(type==='due')u.dueDate=av;if(type==='list')u.listId=av;if(type==='status'){u.status=av;u.completed=av==='complete';u.completedAt=av==='complete'?new Date().toISOString():'';}if(type==='complete'){u.completed=true;u.completedAt=new Date().toISOString();u.status='complete';}if(type==='incomplete'){u.completed=false;u.completedAt='';u.status='notstarted';}await pushTask(u,'update');}n++;}
  const lbl={reassign:'Reassigned',priority:'Priority updated',due:'Due date set',list:'Moved',status:'Status updated',complete:'Marked complete',incomplete:'Marked incomplete',delete:'Deleted'};
  toast(`${lbl[type]}: ${n} task${n!==1?'s':''}`, 'success');closeMassUpdate();
}

// ══════════════════════════════════════
// RENDER VIEW
// ══════════════════════════════════════
function renderView(){
  if(state.mainView==='overview')renderOverview();
  else if(state.mainView==='calendar')renderCalendar();
  else if(state.mainView==='settings')renderSettings();
  else if(state.mainView==='import')renderImport();
  else if(state.mainView==='office')renderOffice();
  else if(state.mainView==='list'&&state.currentListId)renderKanban(state.currentListId);
  else renderTasksView();
}

// ══════════════════════════════════════
// BOOT
// ══════════════════════════════════════
function _boot(){
  document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
  const saved=localStorage.getItem('familyhub_v2');
  if(!saved){document.getElementById('setup-screen').style.display='flex';document.getElementById('app').style.display='none';}
  else{
    try{const c=JSON.parse(saved);if(c.theme)state.theme=c.theme;if(c.members)state.members=c.members;if(c.lists)state.lists=c.lists;if(c.gcalKey)state.gcalKey=c.gcalKey;if(c.gcalId)state.gcalId=c.gcalId;}catch(e){}
    startApp();
  }
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',_boot);
else setTimeout(_boot,0);
</script>
